content:
  - name: posts
    label: Posts
    type: collection
    path: src/content/posts
    format: frontmatter    # ← this tells PageCMS these are .md files with frontmatter
    create: true
    delete: true
    
    # Body goes HERE – outside fields
    body:
      label: Body
      type: markdown
      required: true
    
    fields:
      - name: id
        label: ID
        type: string
        required: true
      - name: title
        label: Title
        type: string
        required: true
      - name: date
        label: Date
        type: string
        required: true
      - name: author
        label: Author
        type: string
        required: false
      - name: quotedAuthor
        label: Quoted Author
        type: string
        required: false
      - name: topics
        label: Topics
        type: string        # comma-separated for now
        required: false
      - name: type
        label: Type
        type: select
        options:
          - message
          - article
          - translation
        default: message
      - name: edited
        label: Edited
        type: string
        required: false
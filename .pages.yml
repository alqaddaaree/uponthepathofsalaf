site:
  title: "The Salaf's Path"
  description: "Islamic content from the Salaf"

content:
  - name: posts
    label: Posts
    type: collection
    path: src/content/posts
    format: frontmatter
    create: true
    delete: true
    fields:
      - name: id
        label: ID
        type: string
        required: true
      - name: title
        label: Title
        type: string
        required: true
      - name: date
        label: Date
        type: string        # ← changed from datetime
        required: true
      - name: author
        label: Author
        type: string
        required: false
      - name: quotedAuthor
        label: Quoted Author
        type: string
        required: false
      - name: topics
        label: Topics
        type: string        # ← changed from list
        required: false
        # For now, enter topics as a comma-separated list in a single text field.
        # Example: "Hadith, Scholars, Seerah"
      - name: type
        label: Type
        type: select
        options:
          - message
          - article
          - translation
        default: message
      - name: edited
        label: Edited
        type: string        # ← changed from datetime
        required: false
      - name: body
        label: Body
        type: markdown      # ← or rich-text – both work
        required: true
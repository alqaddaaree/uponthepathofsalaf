site:
  title: "The Salaf's Path"
  description: "Islamic content from the Salaf"

content:
  - name: posts
    label: Posts
    type: collection               # ← required
    path: src/content/posts
    format: frontmatter
    create: true
    delete: true
    fields:
      - name: id
        label: ID
        type: number
        required: true
      - name: title
        label: Title
        type: string
        required: true
      - name: date
        label: Date
        type: datetime
        required: true
      - name: author
        label: Author
        type: string
        required: false
      - name: quotedAuthor
        label: Quoted Author
        type: string
        required: false
      - name: topics
        label: Topics
        type: list
        default: []
        items:
          type: string
      - name: type
        label: Type
        type: select
        options:
          - message
          - article
          - translation
        default: message
      - name: body
        label: Body
        type: markdown            # or 'rich-text'
        required: true
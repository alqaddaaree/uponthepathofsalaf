site:
  title: "The Salaf's Path"
  description: "Islamic content from the Salaf"

content:
  - name: posts
    label: Posts
    type: collection
    path: src/content/posts
    format: frontmatter
    create: true
    delete: true
    
    # Body goes here, not inside fields
    body:
      label: Body
      type: markdown
      required: true
    
    fields:
      - name: id
        label: ID
        type: string         # changed from number
        required: true
        
      - name: title
        label: Title
        type: string
        required: true
        
      - name: date
        label: Date
        type: datetime
        required: true
        
      - name: author
        label: Author
        type: string
        required: false
        
      - name: quotedAuthor
        label: Quoted Author
        type: string
        required: false
        
      - name: topics
        label: Topics
        type: list
        default: []
        items:
          type: string
        
      - name: type
        label: Type
        type: select
        options:
          - message
          - article
          - translation
        default: message
      
      - name: edited
        label: Edited
        type: datetime
        required: false
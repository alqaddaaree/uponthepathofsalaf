content:
  - name: posts
    label: Posts
    type: collection
    path: src/content/posts
    extension: yaml          # ← .yaml files, not .md
    create: true
    delete: true
    fields:
      - name: id
        label: ID
        type: string
        required: true
      - name: title
        label: Title
        type: string
        required: true
      - name: date
        label: Date
        type: string
        required: true
      - name: author
        label: Author
        type: string
        required: false
      - name: quotedAuthor
        label: Quoted Author
        type: string
        required: false
      - name: topics
        label: Topics
        type: string          # comma-separated for now
        required: false
      - name: type
        label: Type
        type: select
        options:
          - message
          - article
          - translation
        default: message
      - name: edited
        label: Edited
        type: string
        required: false
      - name: body            # body is now a regular field (inside fields)
        label: Body
        type: markdown        # or 'text' – both work in YAML
        required: true
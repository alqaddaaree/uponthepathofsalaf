# .pages.yml
site:
  title: "The Salaf's Path"
  description: "Islamic content from the Salaf"

content:
  # ---- TOPICS COLLECTION (must be defined first) ----
  - name: topics
    label: Topics
    type: collection
    path: src/content/topics
    extension: yaml
    create: true
    delete: true
    fields:
      - name: name
        label: Name
        type: string
        required: true
      - name: slug
        label: Slug
        type: string
        required: true
        help: "URL-friendly identifier (e.g., 'hadith', 'knowledge')"
      - name: description
        label: Description
        type: text
        required: false
      - name: icon
        label: Icon (emoji)
        type: string
        required: false
        help: "e.g., 📜, ✨, 🕌"
      - name: order
        label: Display Order
        type: number
        default: 999
        required: false
        help: "Lower numbers appear first"

  # ---- POSTS COLLECTION ----
  - name: posts
    label: Posts
    type: collection
    path: src/content/posts
    extension: yaml
    create: true
    delete: true
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: date
        label: Date
        type: string
        required: true
      - name: topics
        label: Topics
        type: reference          # ← changed from "relation"
        collection: topics       # ← references the topics collection
        multiple: true           # ← allows selecting multiple topics
        display: name            # ← shows topic name in the dropdown
        required: false
      - name: type
        label: Type
        type: select
        options:
          - message
          - article
          - translation
        default: message
      - name: body
        label: Content
        type: rich-text
        required: true
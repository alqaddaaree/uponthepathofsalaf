# .pages.yml
site:
  title: "The Salaf's Path"
  description: "Islamic content from the Salaf"

content:
  # ---- POSTS COLLECTION ----
  - name: posts
    label: Posts
    type: collection
    path: src/content/posts
    extension: yaml
    create: true
    delete: true
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: date
        label: Date
        type: string
        required: true
      - name: author
        label: Author
        type: string
        required: false
      - name: quotedAuthor
        label: Quoted Author
        type: string
        required: false
      - name: topics
        label: Topics
        type: relation          # ← links to the topics collection
        collection: topics
        multiple: true
        display: name           # shows topic name in the dropdown
        required: false
      - name: type
        label: Type
        type: select
        options:
          - message
          - article
          - translation
        default: message
      - name: edited
        label: Edited
        type: string
        required: false
      - name: body
        label: Content
        type: rich-text
        required: true

  # ---- TOPICS COLLECTION ----
  - name: topics
    label: Topics
    type: collection
    path: src/content/topics
    extension: yaml
    create: true
    delete: true
    fields:
      - name: name
        label: Name
        type: string
        required: true
      - name: slug
        label: Slug
        type: string
        required: true
        help: "URL-friendly identifier (e.g., 'hadith', 'knowledge')"
      - name: description
        label: Description
        type: text
        required: false
      - name: icon
        label: Icon (emoji)
        type: string
        required: false
        help: "e.g., 📜, ✨, 🕌"
      - name: order
        label: Display Order
        type: number
        default: 999
        required: false
        help: "Lower numbers appear first"
content:
  - name: posts
    label: Posts
    type: collection
    path: src/content/posts
    extension: yaml
    create: true
    delete: true
    fields:
      - name: id
        label: ID
        type: string
        required: true
        help: "Unique number for this post (e.g., 1, 2, 3...)"
      
      - name: title
        label: Title
        type: string
        required: true
        help: "The main title of the post (this will appear as the heading)"
      
      - name: date
        label: Date
        type: string
        required: true
        help: "ISO format (e.g., 2025-11-07T19:11:46)"
      
      - name: author
        label: Author (optional)
        type: string
        help: "Who wrote the post (e.g., 'Upon the path of the Salaf')"
      
      - name: quotedAuthor
        label: Quoted Author (optional)
        type: string
        help: "If the post quotes a scholar, put their name here"
      
      - name: topics
        label: Topics
        type: string
        list: true           # ← this works with YAML extension
        help: "Add one topic per line (e.g., Hadith, Seerah, Tafsir)"
        items:
          type: string
      
      - name: type
        label: Type
        type: select
        options:
          - message
          - article
          - translation
        default: message
        help: "The nature of the post"
      
      - name: edited
        label: Last Edited (optional)
        type: string
        help: "ISO format (e.g., 2026-04-03T20:32:00)"
      
      - name: body
        label: Content
        type: rich-text       # ← WYSIWYG editor (easier for non‑tech)
        required: true
        help: "Write the main content here. You can use bold, italic, lists, etc."
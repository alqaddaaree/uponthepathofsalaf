body: '**Tawakkul — What It Truly Is and How It Is Achieved


  **


  A question posed to ash-Shaykhah Umm ʿAbdillāh bint ash-Shaykh Muqbil al-Wādi’yyah
  حفظها الله


  **The Question:**


  One of my sisters for the sake of Allāh asks:


  Our Lord, Glorious and Exalted, has indeed taught us that whosoever puts his trust
  in Allāh, then He will suffice him. So how can a person place true reliance upon
  their Lord in a way that pleases Him, and what are the means that help achieve this
  noble act of worship?


  **The Answer:**


  Understanding the meaning of tawakkul clarifies what is meant by it. It is truly
  depending upon Allāh, not turning to oneself nor to anyone else besides Him, Glorified
  and Exalted.


  Ibn Rajab, may Allāh have mercy on him, said in Jāmiʿ al-ʿUlūm wa al-Ḥikam (2/497):


  “It is the heart''s true reliance upon Allāh—Glorified and Exalted—in seeking benefits
  and warding off harm in all matters of this world and the Hereafter. It is entrusting
  all affairs to Him and affirming with true faith that no one gives, withholds, harms,
  or benefits except Him”


  Ibn al-Qayyim said in Madārij al-Sālikīn (1/103):


  If you ask: What is the meaning of tawakkul and (ʾistiʿānah) seeking assistance?


  I say: it is a state of the heart that arises from one’s knowledge of Allāh and
  belief in His singularity in creation, disposal of affairs, harm, benefit, giving,
  and withholding. Whatever He wills occurs even if people do not will it, and whatever
  He does not will does not occur even if people will it. This necessitates reliance
  upon Him, entrusting matters to Him, finding tranquility in Him, trusting Him, and
  being certain of His sufficiency for what one relies upon. The heart becomes full
  of Him, and this does not happen except by His will, whether people will it or not.
  This resembles the state of a child with its parents regarding what he hopes for
  and fears, as they are fully capable of fulfilling those for him. Observe how his
  heart is free from turning to anyone other than his parents and how his concerns
  are confined to attaining what he intends through them. This is the state of the
  one who relies upon Allāh.”


  Ash-Shaykh Ibn Bāz said in Majmūʿ al-Fatāwā (4/427):


  “Tawakkul combines two things:


  Firstly: Dependence upon Allāh and belief that He is the Causer of all causes, that
  His decree is executed, and that He has decreed, recorded, and written all matters,
  Glorified and Exalted is He.


  Secondly: Acting upon the means; for tawakkul does not mean abandoning the means.
  Rather, it combines acting upon the means while depending on Allāh.” End quote (intended
  meaning)


  **From the things that aid dependence on Allāh alone include:**


  📍 Beneficial knowledge: For it is a radiant light that guides to the straight path.


  📍 ʿAqīdah: Whoever has ʿaqīdah (creed) and knowledge of Allāh, His Names and Attributes,
  His Messengers and His Books, will attain tawakkul which will increase him in strength.


  📍 Faith in Divine Decree (Al-Qadr): My father, ash-Shaykh Muqbil, may Allāh The
  Exalted have mercy on him, mentioned in Al-Jāmiʿ aṣ-Ṣaḥīḥ fī al-Qadr (14) that among
  the fruits of belief in Divine Decree are tawakkul, certainty, dependence on Allāh,
  and submission to Him:


  “Say: Nothing shall ever happen to us except what Allāh has ordained for us." [At-Tawbah
  : 51]


  📍 Knowing the biographies of the Prophets: For they are examples for those who rely
  upon Allāh.


  📍 Frequent remembrance of Allāh, supplication, and seeking forgiveness: Our Lord
  says: “Those who believed (in the Oneness of Allāh- Islāmic Monotheism), and whose
  hearts find rest in the remembrance of Allāh: verily, in the remembrance of Allāh
  do hearts find rest” [Ar-Raʿd : 28]


  📍 Humility: Ibn al-Ḥājj said in Al-Madkhal (3/71):


  “When humility settles in the heart, all goodness settles within it: compassion,
  gentleness, mercy, submissiveness, contentment, tawakkul, good assumptions, intense
  modesty, good manners, renouncing greed, striving against the self, extending goodness,
  serenity of the heart, preoccupation away from oneself, hastening to do good, and
  slowing from evil.”'

title: 'Imām al-Saʿdī: Tafsīr of Sūrah al-Kahf, Verse 98'
date: '2026-01-05T04:13:38'
author: عَلَىٰ نَهجِ السَّلَفِ  Upon the path of the Salaf
topics:
- tafsir
type: message
body: 'Imām al-Saʿdī رحمه الله says in his tafsīr of verse 98 of Sūrat al-Ḥijr:


  “So you, O Muḥammad, ‘exalt with praise of your Lord and be among those who prostrate’
  — meaning: increase in the remembrance of Allāh, in glorifying Him, praising Him,
  and in prayer. For indeed, that expands and opens the chest and helps you in your
  affairs.”'

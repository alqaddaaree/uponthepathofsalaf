title: 'Shaykh Ibn ʿUthaymīn: Stay Away from Suspicion'
date: '2025-11-06T21:20:04'
author: عَلَىٰ نَهجِ السَّلَفِ  Upon the path of the Salaf
topics:
- scholars
type: message
body: '**Shaykh Ibn ʿUthaymīn رحمه الله said:**


  “Try to stay away from everything that brings worry, sadness, and distress, so that
  you will always be at ease, with an open and relaxed heart, turning toward Allah
  and His worship, and toward your worldly and religious affairs.”


  **Sharḥ Bulūgh al-Marām (5/533)


  **


  > Tr: Umm ʿAbdirraḥmān as-Sūdāniyyah'

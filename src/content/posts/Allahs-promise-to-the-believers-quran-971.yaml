type: message
body: '{وَعَدَ اللَّهُ الْمُؤْمِنِينَ وَالْمُؤْمِنَاتِ جَنَّاتٍ تَجْرِي مِن تَحْتِهَا
  الْأَنْهَارُ خَالِدِينَ فِيهَا وَمَسَاكِنَ طَيِّبَةً فِي جَنَّاتِ عَدْنٍ ۚ وَرِضْوَانٌ
  مِّنَ اللَّهِ أَكْبَرُ ۚ ذَٰلِكَ هُوَ الْفَوْزُ الْعَظِيمُ}


  *“Allāh has promised the believing men and believing women gardens beneath which
  rivers flow, wherein they will abide eternally, and pleasant dwellings in Gardens
  of ‘adn. And the greatest [blessing] is the pleasure of Allāh—that is the supreme
  success.”* [at-Tawbah: 72]


  **Ibn Kathīr –may Allāh have mercy on him– said in his Tafsīr: **


  “That is, Allāh’s being pleased with them is greater, nobler, and more magnificent
  than the bliss they are in. As Imām Mālik narrated from Zayd ibn Aslam, from ʿAṭāʾ
  ibn Yasār, from Abū Saʿīd al-Khudrī, that the Messenger of Allāh ﷺ said:


  **“Indeed, Allāh, the Mighty and Majestic, will say to the people of Paradise: O
  people of Paradise! They will say: At Your service, our Lord, and all goodness is
  in Your Hands. He will say: Are you pleased? They will say: And how could we not
  be pleased, O Lord, when You have given us what You have not given to anyone of
  Your creation? He will say: Shall I not give you something better than that? They
  will say: O Lord, what could be better than this? He will say: I bestow upon you
  My pleasure, and I will never be displeased with you thereafter, ever.” **This hadith
  is agreed upon.'

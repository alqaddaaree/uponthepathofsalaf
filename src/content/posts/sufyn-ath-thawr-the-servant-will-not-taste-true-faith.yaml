title: 'Sufyān ath-Thawrī: The Servant Will Not Taste True Faith'
date: '2026-01-14T04:52:14'
author: عَلَىٰ نَهجِ السَّلَفِ  Upon the path of the Salaf
quotedAuthor: ''
topics:
- trials
type: message
edited: '2026-01-14T04:53:49'
body: 'Sufyan ath-Thawrī رحمه الله said:


  **"The servant will not taste the sweetness of īmān until trials come to him from
  every place."**


  Hilyatul Awliyāh 10/204'

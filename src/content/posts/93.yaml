title: The Ṣaḥābiyyāt رضي الله عنهن exposed nothing except what was absolutely necessar...
date: '2026-02-11T01:54:41'
author: عَلَىٰ نَهجِ السَّلَفِ  Upon the path of the Salaf
quotedAuthor: ''
topics:
- Trials
- Women
type: message
edited: '2026-02-11T02:02:43'
body: The Ṣaḥābiyyāt رضي الله عنهن exposed nothing except what was absolutely necessary
  for sight. Today, Allāh has provided fabrics that allow vision without exposing
  the eyes at all—so what excuse remains? What, then, compels us to reveal them? Fear
  Allāh, my dear sisters, and do not open the door to fitnah.

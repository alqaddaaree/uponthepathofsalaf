type: message
forwarded_from: The Scourge Of Photography
body: '**A Piece Of Advice regarding the issue of taswīr**


  Go easy on common folks regarding the issue if tasweer.


  There''s a lot of falsehood out there, and the whole world has no issue with using
  and making pictures.


  It takes a considerable amount of courage to go against all of that, and join the
  isolated island of truth.


  If Allāh has not granted you tawfeeq and guidance, you''d be out there sharing memes
  and watching funny videos.


  It''s quite heavy to accept that tasweer of animate beings is ḥarām, so do your
  best to make your advice and approach as tolerable and easy as you could.


  Pretend you want to keep a thin cord attached between you and them. They''re already
  pulling so hard, so don''t mirror that. Go soft. (Wisdom benefited from a narration
  from Mu’āwiyah, may Allāh be pleased with him. Not sure if authentic, but the meaning
  is correct).


  With that said, I feel optimistic, that this scourge will soon meet its demise,
  which is why I named my book what means: The Rising of the Dawn''s Light, Upon the
  Issue of Photography in Its Darkest Night.


  Meaning, inshaa''Allah, this book is the start of fighting the darkness of this
  issue, and raising awareness about it.


  والله المستعان.


  ---


  Edit: Title by the admins of https://t.me/khazinatulilm


  جزاهم الله خيرا.'

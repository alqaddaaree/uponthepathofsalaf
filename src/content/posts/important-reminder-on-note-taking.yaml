body: '**Important Reminder on the Matter of Note-Taking


  ———•———•———•———•———


  **In the most recent lesson of al-Mabādī al-Mufīdah by Ustādh Abū Hurayrah Al-Brīṭānī,
  the issue of note-taking and sharing notes was discussed. Ustādh noted mistakes
  or things that could be better.


  **So, how does a person take good notes?**


  The *aṣl* is that it is not done digitally, but it is done by pen and paper. If
  one wishes, he can write them up digitally after writing by hand. This is khair—no
  problem in this.


  One benefit of this: taking notes by writing physically is a means for a person
  to memorise and remember [the content] very well. As your mind is 100% engaged in
  what you’re doing, it becomes ingrained. The phone/computer is not the same.


  **What does a person write?**


  The aṣl is that he should write every single word the teacher says. Why? Because
  the teacher says the words he says _for a reason_ and he chooses the words carefully
  and says it with a purpose.


  **Every single word is important!**


  If they are able, they should strive to write every single word.


  Of course, if the teacher repeats something to make it clear and allow it to stay
  in your mind and to make sure it’s understood, this is a chance to catch up what’s
  missed—you don''t need to write it again.


  Pay attention to the words. Don’t change words.


  This can inadvertently change the meaning.


  For example, if the teacher says something has been “narrated from Prophet ﷺ,” and
  in their notes they say “the Prophet ﷺ said this…” —but this is **not** what Ustādh
  has said.


  There is a difference between these two things. When the Ustādh said this [the former],
  he is weakening this narration or indicating it may not be ṣaḥīḥ. However, if one
  writes the latter in their notes, they are attributing to the teacher **something
  he did not say**.


  If they [the teacher] say “in my opinion..” or “Allāh knows best, this is the correct
  position..” and they write “the correct opinion is..”, this is not right. The former
  wording is indicating the fact that the teacher could be incorrect.


  **Therefore,**


  •Pay close attention to wordings used and the intent, especially if it’s being published
  or shared with other people.


  •If a person misses something, then just leave a blank space. If you fill in the
  gaps [yourself], you may well attribute something to the teacher that they didn’t
  say.


  •If there’s a recording, then fill in gaps later, if not then compare notes with
  others. If you try fill in gaps, you may be incorrect.


  Strive to write **everything** a teacher has said!


  After the lesson, one can summarise notes in a way that makes it easy to revise.


  🖊️Umm Muṣʿab Al-Ghāniyyah Al-Almāniyyah'

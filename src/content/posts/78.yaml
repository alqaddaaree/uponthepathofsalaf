edited: '2026-03-02T21:53:42'
body: '**Are you in doubt about a certain matter..?


  **This religion is not based upon** **doubts. We go upon what is certain.


  As our Messenger ﷺ told us:


  "دَعْ ما يُريبُك إلى ما لا يُريبُك"


  ''Leave that which makes you doubt for that which does not make you doubt.''


  [*Sunan an-Nasa''i 5711*]


  **As an added benefit: hasten to do that which is best!


  **The way we ask questions is wrong—“is this permissible..?”


  Unfortunately, today the only thing that many of us are concerned with is permissibility.


  The Ṣaḥābah didn’t do certain things out of fear of falling into the ḥarām, even
  though they were totally permissible.


  For example: it’s permissible to go to the store; you went and there was a male
  seller. He cracks a joke. You try to hold back your laugh, but you couldn’t. You
  end up laughing. Your voice rises. You just fell into the ḥarām.


  This is not to say that you should not go to the store, however _not every permitted
  deed do we need to do_.


  Thus, we be careful when we embark upon actions that are permissible.


  The Prophet ﷺ used to encourage us to do that which is **better, **that which is
  more virtuous.


  So we must differentiate between that which is permitted and that which is better.
  Just because


  something is permissible does not mean it is encouraged.


  We must, however, have a balanced understanding — we do not beat somebody down because
  they didn’t necessarily do what’s best; nor do we stick to what’s permitted and
  not race to do what’s best, and say “the main thing is that’s it’s permitted.”


  No—this is not what the Companions رضي الله عنهم were upon, and they did not reach
  the level of acceptance with Allāh ﷻ by following everything that was merely permitted.
  In other words, **they did not do the bare minimum**, but in fact raced to do that
  which is higher and more praiseworthy.


  And the believer follows in the footsteps of the salaf.


  قالَ الله:فَٱسۡتَبِقُوا۟ ٱلۡخَیۡرَ ٰ⁠تِ


  Meaning: “Rush and hasten to do good deeds.” [*Sūrah al-Baqarah:148*]


  والله أعلم


  > Benefitted from Ustādha Umm Hyatt حفظها الله in Kitāb as-Ṣiyām dars


  - أم مصعب الغانية الألمانية'

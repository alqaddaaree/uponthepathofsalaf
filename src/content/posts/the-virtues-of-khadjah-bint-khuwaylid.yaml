body: 'From the virtues of **Khadījah bint Khuwaylid**, may Allāh be pleased with
  her.


  بِـسم اللّٰـه الرّحمـٰن الرّحيـم


  “She never compelled him to raise his voice” So take Khadījah—may Allāh be pleased
  with her—as your example, O women!


  > Abū Hurayrah (may Allāh be pleased with him), narrated: Jibrīl came to the Prophet
  ﷺ and said: “O Messenger of Allāh! This is Khadījah, she has come to you carrying
  a vessel containing condiments and food. When she comes to you, convey to her greetings
  of peace from her Lord and from me, and give her glad tidings of a house in Paradise
  made of hollowed pearls (qaṣab), wherein there is no clamour (ṣakhab) nor fatigue
  (naṣab).” Agreed upon.


  It is mentioned in Fatḥ al-Bārī (11/134): **“Made of qaṣab”**: Meaning a hollow
  pearl, spacious like a lofty palace.


  As-Suhaylī said: “The subtle point in the wording “qaṣab” instead of “pearl” is
  that it corresponds to her having attained the lead (qaṣab al-sabaq) by hastening
  to faith before others. This is why this connection appears throughout this entire
  ḥadīth." [End quote]


  There is another connection in “qaṣab” as most of its tubes are straight and even—likewise
  Khadījah had a levelness not found in others. She was keen upon pleasing him ﷺ in
  every possible way, and nothing ever came from her that angered him, unlike others.


  **“A house”**: Meaning a house in addition to what Allāh prepared for her as the
  reward of her deeds. Hence he said: **“nor fatigue”**, meaning she did not experience
  hardship in attaining it.


  As-Suhaylī said: "Mentioning "house" has a subtle meaning, because she was a mistress
  of a house before the Prophethood, then she became the mistress of a house of ʾIslām
  alone! As there was no house of ʾIslām on earth at the first day of the Prophet’s
  ﷺ prophethood except her house—this is a virtue no one else shared."


  He added: "Reward is often mentioned using the same expression as the deed, even
  if the reward is more noble. Hence the ḥadīth says “house” rather than “palace.”"
  [End quote]


  And in mentioning the “house” lies another meaning, reflecting that the Prophet’s
  household [children] ultimately returned to her.


  **


  “Wherein there is no ṣakhab nor naṣab”**: **Ṣakhab**: Arguments and dispute with
  raised voices. **Naṣab**: Fatigue.


  As-Suhaylī said: “The suitability of negating these two is that when the Prophet
  ﷺ called her to ʾIslām, she responded willingly—she did not make him raise his voice,
  nor dispute, nor struggle. Rather, she removed from him all hardship, made him feel
  at ease from every loneliness, and made every difficulty easy for him. So it was
  fitting that her dwelling, with which her Lord gave her glad tidings, be described
  with the qualities corresponding with her actions.” (End of quote, abridged)


  ———•———•———•———•———


  In ‘Umdat al-Qārī (16/281):


  “..The mention of “clamour” and “fatigue” is also by way of correspondence; as when
  he ﷺ called her to faith, she responded quickly and did not require him to raise
  his voice as a man might if his wife resisted him, nor did she cause him hardship.
  Rather, she removed every hardship from him, made him feel at ease from every loneliness,
  eased every difficulty, and relieved burdens with her wealth. Thus her abode was
  described in a way that corresponds to her state and actions.” [End quote]


  ———•———•———•———•———


  In Tafsīr ibn Kathīr (6/404):


  “From the special qualities of Khadījah (may Allāh be pleased with her) is that
  she never upset him, never angered him, and he never had to take an oath of abstinence
  from her, nor was there ever any blame or abandonment between them. And this alone
  is a sufficient virtue and merit.” [End quote]


  So may Allāh be pleased with our mother Khadījah and all the Mothers of the Believers,
  and gather us with them in the highest Paradise. Indeed, my Lord is All-Hearing,
  All-Knowing.


  > Written by: Ḥassānah bint Muḥammad al-ʾAlbānī حفظها الله


  Tr: Umm Tamīm aṣ-Ṣūmāliyyah



title: 'Shaykh Ibn Bāz: The Importance of Congregational Prayer'
date: '2025-11-26T08:00:33'
author: عَلَىٰ نَهجِ السَّلَفِ  Upon the path of the Salaf
topics:
- knowledge
- scholars
type: message
body: 'Shaykh Ibn Bāz رحمه الله said:


  “If a person does not attend lessons of knowledge, nor listen to sermons, nor pay
  attention to what is conveyed from the people of knowledge, then his heedlessness
  increases. And his heart may even harden until it becomes sealed and stamped, and
  he becomes among the heedless.”


  📚 Majmū‘ al-Fatāwā (12/324)


  > Tr: Umm ʿAbdirraḥmān as-Sūdāniyyah'

body: 'بسم الله الرحمـٰن الرحيم


  Many of us often look at what we’re missing, and it makes us feel lacking — ungrateful.
  We remind ourselves—and one another—not to focus on what we lack, but to look at
  what we have. Yet how many of us truly live by this advice? Very few.


  Allah ﷻ says:


  ﴿وَقَلِيلٌ مِّنْ عِبَادِيَ الشَّكُورُ﴾


  “And very few of My servants are truly grateful.” [Sabaʾ: 13]


  We allow ourselves to feel miserable over what we do not have, while forgetting
  the immense blessings Allah has already bestowed upon us. And this is the nature
  of mankind, as Allah ﷻ says:


  ﴿إِنَّ الْإِنسَانَ لِرَبِّهِ لَكَنُودٌ﴾


  “Indeed, man is truly ungrateful to his Lord.” [al-ʿĀdiyāt: 6]


  We forget even the most obvious of blessings — health, sight, sanity, emotions,
  literacy — and so much more endless blessings, each of them carrying more blessings
  within it. The greatest of them being that Allah ﷻ guided you to Islam.


  Even more than that, He guided you to Ahlus Sunnah, to Ahlul Hadith, to the manhaj
  of the Salaf.


  How can you allow yourself to overlook all this faḍl Allah bestowed upon you? How
  can sadness dominate your heart when you are surrounded by so many blessings—especially
  the greatest of them all?


  Allah has not given anyone anything greater than Islam.


  The Messenger of Allah ﷺ said:


  «عَلَيْكُمْ بِسُنَّتِي وَسُنَّةِ الْخُلَفَاءِ الرَّاشِدِينَ الْمَهْدِيِّينَ، عَضُّوا
  عَلَيْهَا بِالنَّوَاجِذِ»


  “Hold firmly to my Sunnah and the Sunnah of the rightly guided caliphs, bite onto
  it with your molar teeth" [At-Tirmidhi 2676]


  But how can we cling to something we do not value? How can we hold firmly to that
  which we belittle or fail to recognize as a blessing? How can one truly hold onto
  it when they are constantly fixated on worldly matters — while overlooking this
  faḍl that, had Allah withheld it, they would have been among the disbelievers? And
  that—being cursed by Allah and cast into the Hellfire—is a calamity greater than
  any worldly loss. There is nothing worse than that.


  Thank Allah for what He has granted you, and hold onto it tightly, just as the Prophet
  ﷺ commanded you.


  Allah ﷻ says:


  ﴿وَكَانَ فَضْلُ اللَّهِ عَلَيْكَ عَظِيمًا﴾


  "and ever has the favour of Allah upon you been great" [An-Nisāʾ:113]


  Allah chose you—out of millions, billions, trillions of people from the beginning
  of time until its end—to guide you to the truth and make you among His servants.


  What blessing could be greater than that?


  Hold onto it firmly, because no one is guaranteed steadfastness until death. You
  are not promised that you will wake up tomorrow upon guidance.


  The Prophet ﷺ warned us of trials so severe that a man may wake up a believer and
  go to sleep a disbeliever—or go to sleep a believer and wake up a disbeliever.


  So ask Allah for steadfastness.


  And thank Him—because if you are grateful, He will increase you:


  ﴿وَإِذْ تَأَذَّنَ رَبُّكُمْ لَئِن شَكَرْتُمْ لَأَزِيدَنَّكُمْ ۖ وَلَئِن كَفَرْتُمْ
  إِنَّ عَذَابِي لَشَدِيدٌ﴾


  "And [remember] when your Lord proclaimed, ''If you are grateful, I will surely
  increase you [in favor]; but if you deny, indeed, My punishment is severe.''" [Ibrāhīm:
  7]


  The only thing that is truly worth sadness is missing out on khayr you''re capable
  of doing.


  والله المستعان.


  > -أم عبدالرحمـٰن السودانية غفر الله لها'

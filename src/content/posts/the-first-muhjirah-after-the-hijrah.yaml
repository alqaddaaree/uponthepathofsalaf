body: '**The first Muhājirah after the Hijrah of the Prophet ﷺ:**


  **Umm Kulthūm bint ʿUqbah ibn Abī Muʿayṭ**


  She accepted Islam in Makkah and gave the pledge of allegiance (bayʿah) before the
  Hijrah. She was the first woman to emmigrate after the Messenger of Allāh ﷺ emmigrated
  to Madīnah. She emmigrated during the truce of Ḥudaybiyah.


  Rabīʿah ibn ʿUthmān and Qudāmah both said: "We do not know of any Qurashī woman
  who left her parents as a Muslim emigrant except Umm Kulthūm."


  She said: "I used to go out to a desert area of ours where my family resided, staying
  there for three or four nights—it was in the direction of Tanʿīm—then I would return
  to my family. They did not object to my going to the desert area until I resolved
  to set out [for Madīnah]. One day I left Makkah as if I intended to go to the desert,
  and when those who were following me turned back I saw a man from Khuzāʿah. He asked:
  ''Where do you intend to go?'' I said: ''Why do you ask? Who are you?'' He said:
  ''A man from Khuzāʿah.'' When he mentioned Khuzāʿah, I felt at ease because the
  tribe of Khuzāʿah was included in the covenant and allegiance of the Messenger of
  Allāh ﷺ. So I said: ''I am a woman from Quraysh, and I wish to join the Messenger
  of Allāh ﷺ, but I do not know the way.''


  He said: ''I will be your companion until I bring you to Madīnah.''


  Then he brought me a camel and I rode it. He led the camel, and by Allāh, he did
  not speak a single word to me. When he made the camel kneel, he moved away from
  me. When I dismounted, he would come to the camel, tie it to a tree, and move away
  to the shade of another tree. When it was time to depart, he would saddle the camel
  and lead it away, turning away from me. When I mounted, he would take hold of its
  head and not look back until I dismounted. He continued like that until we reached
  Madīnah. May Allāh reward him for his good companionship.


  I then entered upon Umm Salamah while I was veiled, she did not recognize me until
  I introduced myself and uncovered my veil. She embraced me and said: ''You have
  emmigrated to Allāh, Mighty and Majestic, and to His Messenger?'' I said: ''Yes,
  but I fear that he will send me back just as he sent back Abū Jandal and Abū Baṣīr,
  and the situation of men is not like that of women. My people will search for me,
  I have been away for five days now since I left them. They will estimate the amount
  of time I usually stayed away, then they will search for me. If they do not find
  me, they will set out.''”


  Then the Messenger of Allāh ﷺ entered upon Umm Salamah, and she informed him of
  the news of Umm Kulthūm. He welcomed and reassured her.


  I said: "I have fled to you with my religion. Keep me and do not send me back to
  them, for they trial and torture me. I have no patience for torture. I am only a
  woman—weak as women are, as you know. And I have seen that you sent back two men
  until one of them refused."


  He said: "Indeed, Allāh, Mighty and Majestic, has nullified the treaty regarding
  women and has made a ruling concerning them with which they are all pleased." As
  he used to send back the women.


  The next day, her two brothers—Al-Walīd and ʿAmmārah—came and said: "Fulfill your
  promise and the covenant you made with us."


  He said: "Allāh has nullified the treaty." So they left.


  (1/2)'

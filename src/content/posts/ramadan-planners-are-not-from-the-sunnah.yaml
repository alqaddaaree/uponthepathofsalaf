body: 'بسم الله الرحمن الرحيم


  > RAMADAN PLANNERS & ADVENT CALENDARS


  The Prophet ﷺ did not teach us to do this, therefore it is not a Sunnah.


  When we look to the Sahaba رضي الله عنهم, we find that they did not practice this,
  nor did the generations after them, such as the Tabi‘een رحمهم الله. This shows
  that it is not the way of those who preceded us.


  Furthermore, this practice is not found in any of the books of fiqh.


  A bid‘ah is an innovation that is introduced into the Deen without precedent and
  is connected to an act of ‘ibaadah.


  Based on this, it is considered a bid‘ah.


  > عن ام المؤمنين عائشة رضي الله عنها قالت


  قال رسول الله صلى الله عليه وسلم


  ((من أحدث فى أمرنا هذا ما ليس منه فهو رد))


  [Al-Bukhari 2697 Muslim 1718]


  الله المستعان


  The danger of bid‘ah is that it grows over time, becoming more widespread and increasingly
  harmful. For this reason, it must not be enabled.


  > شيخة ام عبدالله شهيدة البريطانية (الله يحفظها)'

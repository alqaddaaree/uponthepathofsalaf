body: '**The Fitnah of a Woman Uncovering Her Eyes in Front of Non-Mahram Men**


  Shaykha Umm ʿAbdillāh Al-wādiʿiyyah حفظها الله said:


  A poet said:


  *She has a complexion like silk, and speech... Soft at the edges—neither nonsense
  nor scant.


  And two eyes to which Allah said “Be,” and they were, They overpower the intelligent
  as wine does.*


  And another said:


  *Indeed, the eyes whose edges are ḥūr-like.. Have killed us—then did not revive
  those they killed.


  They strike down the intelligent until no movement remains, Though they are among
  Allah’s weakest of creations in strength.


  *


  If people of intellect—those possessing sound reason—are tempted by a woman’s eyes,
  then how about others from the lowly and the weak-minded?!


  Know that a woman bears sin if she becomes a cause of the temptation of men and
  the sickness of their hearts.


  > It is authentically reported from Abū Saʿīd al-Khudrī رضي الله عنه that he said:


  The Messenger of Allah ﷺ went out on the day of al-Aḍḥā or al-Fiṭr to the prayer
  place. He passed by the women and said:


  “O assembly of women, give charity, for I have been shown that you are the majority
  of the people of Hellfire.”


  They said: “Why, O Messenger of Allah?”


  He said: “You frequently curse and are ungrateful to your husbands. I have not seen
  anyone more deficient in intellect and religion who can take away the resolve of
  a firm, decisive man than one of you.”


  They said: “What is the deficiency of our intellect and religion, O Messenger of
  Allah?”


  He said: “Is not the testimony of a woman equal to half that of a man?”


  They said: “Yes.”


  He said: “That is from the deficiency of her intellect. Is it not that when she
  menstruates, she neither prays nor fasts?”


  They said: “Yes.”


  He said: “That is from the deficiency of her religion.”


  Narrated by Abū ʿAbdillāh al-Bukhārī in his Ṣaḥīḥ (304).


  Al-Ḥāfiẓ Ibn Ḥajar رحمه الله said in Fatḥ al-Bārī regarding this ḥadīth:


  > It appears to me that this is among the reasons they are the majority of the people
  of Hellfire;because if they become a cause for taking away the intellect of a firm
  and decisive man—until he does or says what is not appropriate—then they have shared
  with him in the sin, and have even added to it.


  Tr: Umm ʿAbdirraḥmān as-Sūdāniyyah



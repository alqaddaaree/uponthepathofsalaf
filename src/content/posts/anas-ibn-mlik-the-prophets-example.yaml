title: 'Anas ibn Mālik: The Prophet’s ﷺ Example'
date: '2026-01-15T16:24:16'
author: عَلَىٰ نَهجِ السَّلَفِ  Upon the path of the Salaf
topics:
- marriage
- seerah
type: message
body: 'Anas ibn Mālik رضي الله عنه reported that the Messenger of Allah ﷺ said:


  > “Indeed, the Ḥūr al-ʿĪn will sing in Paradise, saying: ‘We are the beautiful Ḥūr,
  preserved for noble husbands.’”


  authenticated by Al-Albāni'

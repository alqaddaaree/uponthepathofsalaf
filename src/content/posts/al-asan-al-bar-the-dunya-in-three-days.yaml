title: 'Al-Ḥasan al-Baṣrī: The Dunya in Three Days'
date: '2025-12-29T08:45:17'
author: عَلَىٰ نَهجِ السَّلَفِ  Upon the path of the Salaf
quotedAuthor: Abī al-Dunyā (29/5)
topics: []
type: message
edited: '2025-12-29T08:45:27'
body: 'Al-Ḥasan al-Baṣrī رحمه الله said, describing the dunya:


  **“It is but dreams of sleep, or like a fleeting shadow;


  the intelligent person is not deceived by such a thing.”**


  Encyclopedia of Ibn Abī al-Dunyā (29/5)'

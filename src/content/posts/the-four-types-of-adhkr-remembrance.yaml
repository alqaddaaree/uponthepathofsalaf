edited: '2026-03-23T21:54:11'
body: '> The types of ʾAdhkār (rememberance) are four :


  1) **That which is bound to a specific time,** such as: The morning and evening
  ʾadhkār.


  2) **That which is bound to an act of worship,** such as: The ʾadhkār which are
  after the ṣalāh.


  This is indicated by the āyah where Allāh—Glorified and Exalted is He—says :


  > «And when you have completed the prayer, remember Allāh standing, sitting, or
  [lying] on your sides..» {Sūrat an-Nisāʾ : 103}


  3) **That which is bound to a reason**, such as: The ʾAdhkār for entering the masjid
  and exiting the masjid.


  When entering the masjid one should begin with their right foot, and say the basmallah
  (i.e Bismillāh), and send Ṣalawāt upon the Prophet ﷺ and say:


  «ʿA`ūdhu billāhil-ʿaẓīm, wa bi-wajhihil-karīm, wa sultānihil-qadīm, min ash-shaytānir-rajīm.
  Allāhummaftaḥ lī ʾabwāba raḥmatik.»


  Translation : [I seek refuge in Almighty Allāh, by His Noble Face, by His Primordial
  power, from Satan the outcast. O Allāh, open before me the doors of Your mercy.]


  And when leaving the masjid, begin with the left foot, and say : «Bismillāh waṣṣalātu
  wassalāmu ʿalā Rasūlillāh, Allāhumma ʾinnī ʾasʾaluka min faḍlik, Allāhumma ʿiṣimnī
  min ash-shaytānir-rajīm.»


  Translation : [In the Name of Allāh, and peace and blessings be upon the Messenger
  of Allāh. O Allāh, I ask for Your favor, O Allāh, protect me from Satan the outcast.]


  ▫️He specified (doors) in the dhikr of entering the masjid _as the masjid is a place
  where Allah''s mercy and grace decends.


  _


  ▫️He specificed (your favor) in the dhikr of exiting the masjid as it is required
  from the person to seek a livelihood.


  And from that is the saying of Allāh Almighty:


  > «And when the prayer has been concluded, disperse within the land and seek from
  the bounty of Allāh, and remember Allāh often that you may succeed.» {Sūrat Al-Jumʿah
  : 10}


  And likewise entering the bathroom and exiting it. It is said when entering : [Allāhumma
  ʾinnī ʾaʿūdhu bika minal-khubthi walkhabāʾith.]


  Translation: [O Allāh, I seek protection in You from evil and the evil ones]


  And when exiting : [Ghufrānaka]


  Translation : [I seek Your forgiveness.]


  4) **That which is not bound by a time, or obligatory act, or reason** which is:
  General and unrestricted dhikr.


  And from that is the saying of the prophet ﷺ : 《Always keep your tongue moist with
  the remembrance of Allāh.》


  Extracted from the live lesson «Explanaing the book Bulūgh al-Marām» for the Ustadh
  and Doctor Sāmī aṣ-Ṣaqīr (may Allāh grant him success) Member of the Council of
  Senior Scholars.


  Tr: Umm Tamīm aṣ-Ṣūmāliyyah'

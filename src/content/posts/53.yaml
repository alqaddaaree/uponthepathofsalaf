body: '**Sins Strip Away Hayā'' **


  Among the punishments of sins is the loss of ḥayāʾ, which is the lifeblood of the
  heart and the foundation of all goodness. When it disappears, all goodness vanishes
  with it.


  In Ṣaḥīḥ al-Bukhārī, it is reported that the Prophet ﷺ said:


  > “Modesty is all good.”


  And he said:


  > “From what the people have retained from the words of the earliest prophethood
  is: If you feel no shame, then do as you wish.”


  This last statement has two interpretations:


  **First interpretation:**


  It is a warning and threat—its meaning is: whoever feels no shame will proceed to
  do whatever vile deeds he wishes, because it is modesty that restrains him from
  such acts. If modesty is absent and nothing holds him back, he will fall into them.
  This is the interpretation of Abū ʿUbayd.


  **Second interpretation:**


  It means: if an action carries no shame before Allah, then go ahead and do it. What
  should be avoided is only that which brings shame before Allah. This is the interpretation
  of Imām Aḥmad as narrated by Ibn Hāniʾ.


  According to the first view, it is a threat—like the verse:


  *“Do as you will.” [Fussilat: 40]


  *


  According to the second view, it is permission or approval.


  Now, if one asks: Is it possible to reconcile both meanings and interpret the statement
  as containing both?


  **I say:** No, not even according to those who allow interpreting shared-word meanings
  with all their definitions, because of the contradiction between permission and
  threat. However, considering one of the meanings naturally leads to recognizing
  the other.


  **The point is:** sins weaken hayāʾ in the servant—until it may be completely stripped
  away. A person might reach the point where he is unaffected by others knowing of
  his sins or being exposed. Many even speak openly about their wickedness and the
  vile acts they commit—and what drives them to this is their loss of modesty.


  *When someone reaches this state, there remains no hope for his reform.*


  > [Ad-Dāʾ wa ad-Dawāʾ, p. 81]'

type: message
body: '*يَا أَيُّهَا الَّذِينَ آمَنُوا إِذَا جَاءَكُمُ الْمُؤْمِنَاتُ مُهَاجِرَاتٍ
  فَامْتَحِنُوهُنَّ ۖ اللَّهُ أَعْلَمُ بِإِيمَانِهِنَّ ۖ فَإِنْ عَلِمْتُمُوهُنَّ مُؤْمِنَاتٍ
  فَلَا تَرْجِعُوهُنَّ إِلَى الْكُفَّارِ ۖ لَا هُنَّ حِلٌّ لَّهُمْ وَلَا هُمْ يَحِلُّونَ
  لَهُنَّ ۖ وَآتُوهُم مَّا أَنفَقُوا ۚ وَلَا جُنَاحَ عَلَيْكُمْ أَن تَنكِحُوهُنَّ
  إِذَا آتَيْتُمُوهُنَّ أُجُورَهُنَّ ۚ وَلَا تُمْسِكُوا بِعِصَمِ الْكَوَافِرِ وَاسْأَلُوا
  مَا أَنفَقْتُمْ وَلْيَسْأَلُوا مَا أَنفَقُوا ۚ ذَٰلِكُمْ حُكْمُ اللَّهِ ۖ يَحْكُمُ
  بَيْنَكُمْ ۚ وَاللَّهُ عَلِيمٌ حَكِيمٌ


  "O you who believe! When believing women come to you as emigrants, examine them;
  Allāh knows best as to their Faith, then if you ascertain that they are true believers
  send them not back to the disbelievers. They are not lawful (wives) for the disbelievers
  nor are the disbelievers lawful (husbands) for them. But give them (the disbelievers)
  that (amount of money) which they have spent [as their Mahr] to them. And there
  will be no sin on you to marry them if you have paid their Mahr to them. Likewise
  hold not the disbelieving women as wives, and ask for (the return of) that which
  you have spent (as Mahr ) and let them (the disbelievers) ask back for that which
  they have spent. That is the Judgement of Allāh, He judges between you. And Allāh
  is All-Knowing, All-Wise." [Al-Mumtaḥanah: 10] *


  > Tr: Hilālī & Khān'

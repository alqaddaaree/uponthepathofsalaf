title: 'Ibn al-Qayyim: The Lover of Dunya'
date: '2025-12-13T17:44:09'
author: عَلَىٰ نَهجِ السَّلَفِ  Upon the path of the Salaf
quotedAuthor: 'Al Qayyim رحمه الله said:'
topics: []
type: message
edited: '2026-06-07T11:04:38'
body: 'Ibn Al Qayyim رحمه الله said:


  "The lover of the dunya does not get rid of three:


  Distress.


  Constant weariness.


  Regret that doesn''t end.”


  إغاثة اللهفان ١/٥٨


  > Tr: Umm ʿAbdirraḥmān as-Sūdāniyyah'

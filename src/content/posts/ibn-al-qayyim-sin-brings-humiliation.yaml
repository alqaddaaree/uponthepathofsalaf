title: 'Ibn al-Qayyim: Sin Brings Humiliation'
date: '2026-01-17T19:51:13'
author: عَلَىٰ نَهجِ السَّلَفِ  Upon the path of the Salaf
topics:
- death
- the-salaf
type: message
body: '**Ibn al-Qayyim رحمه الله said:**


  “Sin inevitably brings humiliation. True honor — all of it — lies in obedience to
  Allah. Allah the Exalted said:


  *{Whoever desires honor — then to Allah belongs all honor} [Fāṭir: 10],*


  **meaning:** Let him seek it through obedience to Allah, for he will not find it
  except in Allah’s obedience.


  Some of the Salaf would make this duʿāʾ:


  “O Allah, honor me through Your obedience, and do not humiliate me through disobedience
  to You.”


  **Al-Ḥasan al-Baṣrī رحمه الله said:**


  "Even if they ride fine mules and well-groomed horses, the humiliation of sin never
  leaves their hearts. Allah refuses except to humiliate those who disobey Him.”


  **And ʿAbdullāh ibn al-Mubārak said:**


  رأيتُ الذنوبَ تُميتُ القلوبَ


  I saw that sins cause the death of hearts,


  وقد يُورِثُ الذُّلَّ إدمانُها


  And persisting in them may lead to humiliation.


  وتركُ الذنوبِ حياةُ القلوبِ


  Abandoning sins gives life to the hearts,


  وخيرٌ لنفسِك عِصيانُها


  And disobeying the self (from sin) is better for it.


  > [Ad-Dāʾ wa ad-Dawāʾ, p. 69]'

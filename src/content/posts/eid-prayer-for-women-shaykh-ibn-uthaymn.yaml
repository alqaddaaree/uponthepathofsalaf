body: '**Eid Prayer for Women**


  Shaykh ibn ʿUthaymīn رحمه الله said:


  "Even women are encouraged to attend the ʿīd prayer. There is no other prayer for
  which women are urged to attend except ʿīd prayer; for example, we do not tell them
  to go to the masjid for Ẓuhr, ʿAṣr, or Jumuʿah—no, only the ʿīd prayer.


  The Prophet ﷺ commanded that al-ʿawātiq (young adult women) and dhawāt al-khudūr
  (unmarried virgins who normally remain at home) be brought out (to the prayer),
  but stay away from the prayer area if they were menstruating.


  However, it is obligatory for a woman, if she comes to the masjid or the ʿīd prayer
  ground, to attend without adornment, without perfume, without raising her voice,
  without laughing, without swaying in her walk, and without anything that could lead
  to fitnah. If she does any of these things, she is sinful and will not be rewarded."


  > Tr: Umm ʿAbdirraḥmān as-Sūdāniyyah'

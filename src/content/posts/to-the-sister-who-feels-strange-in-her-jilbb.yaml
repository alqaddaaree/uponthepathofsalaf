body: '**To the sister who feels strange in her jilbāb **


  Know, my beloved sister in īmān, that you will always feel like a gharībah (stranger).


  Know that by following the commandments of Allāh and His Messenger ﷺ, you will be
  faced with insults and mockery.


  Know that many will look at your garments with hatred in their hearts.


  Know that the majority will never be pleased with you.


  But know that the glad tidings are for the *ghurabā*ʾ.


  > لَتُبْلَوْنَ فِي أَمْوَلِكُمْ وَأَنفُسِكُمْ وَلَتَسْمَعُنَّ مِنَ ٱلَّذِينَ أُوتُوا
  الْكِتُبَ مِن قَبْلِكُمْ وَمِنَ ٱلَّذِينَ أَشْرَكُواْ أَذَى كَثِيرًا وَإِن تَصْبِرُواْ
  وَتَتَّقُواْ فَإِنَّ ذَلِكَ مِنْ عَزْمِ الْأَمُورِ


  You shall certainly be tried and tested in your wealth and properties and in your
  personal selves, and you shall certainly hear much that will grieve you from those
  who received the Scripture before you (Jews and Christians) and from those who ascribe
  partners to Allāh; but if you persevere patiently, and become Al-Muttaqūn (the pious)
  then verily, that will be a determining factor in all affairs (and that is from
  the great matters which you must hold


  on with all your efforts).


  – [Sūrah Āli ʿImrān: 186]


  We are here to be tested. We are here to be tried. Bear these tests with patience
  as the righteous before us did.


  Let them speak.


  Let them mock.


  Let them ridicule.


  Your value is not in their approval. Your worth is not measured by the amount of
  praise you receive, how many compliments you get, or how much the world approves
  of you.


  Your value is with Allāh and obeying Him ﷻ.


  You are wearing the garments of the righteous — the clothing of dignity — the attire
  of those who chase the ākhirah.


  So let not your heart long for the praise of those who chase the adornments of this
  dunyā.


  Dress for His pleasure, seek His approval.


  The only approval you need is His.


  For you will find your reward with Allāh, and He is ash-Shakūr (the Most Appreciative).


  Jannah is for the people who are strange. Those who enjoin others in righteousness
  and piety. Those who correct what the people have corrupted of the Sunnah. Those
  who remain steadfast on this path despite the hardship they face.


  Hold firmly to your dīn dear sisters. Hold firmly to the Sunnah. Hold firmly to
  the way of our salaf (pious predecessors).


  For indeed, blessed are the strangers.


  The Prophet ﷺ said:


  > "بَدَأَ الإِسْلاَمُ غَرِيبًا وَسَيَعُودُ كَمَا بَدَأَ غَرِيبًا فَطُوبَى لِلْغُرَبَاءِ‏"


  “Islam began as something strange and it will return to being strange, so glad tidings
  to the strangers.”


  [Ṣaḥīḥ Muslim 145]


  - أم مصعب الغانية الألمانية'

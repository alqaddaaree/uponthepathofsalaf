body: '**Benefit


  What does ḥasan gharīb mean?**


  Shaykh al-Albānī رحمه الله said:


  Imām —or al-Ḥāfiẓ— at-Tirmidhī رحمه الله indicates that every chain of narration
  for which he says “ḥasan gharīb” means that one of its narrators has some slight
  deficiency in precision and retention of the ḥadīth.


  Thus, the ḥadīth is ḥasan in itself; it is not ṣaḥīḥ—because a ṣaḥīḥ ḥadīth requires
  the narrator to be trustworthy, precise, and strong in memorization—as for a ḥasan
  ḥadīth, the narrator’s precision and memorization are lesser than that of a ṣaḥīḥ
  narrator.


  So when he says “ḥasan gharīb,” he means that the chain is ḥasan in itself, and
  that one of its narrators has a slight weakness in memorization.


  This is what is intended by at-Tirmidhī’s terminology.


  [translation from 4:00-5:06]


  > Tr: Umm ʿAbdirraḥmān as-Sūdāniyyah'

title: 'Shaykh Yaḥyā al-Ḥajūrī: A Duʿā'' for Expansion of the Chest'
date: '2026-01-05T04:05:01'
author: عَلَىٰ نَهجِ السَّلَفِ  Upon the path of the Salaf
quotedAuthor: 'Yaḥyā al-Ḥajūrī حفظه الله said:'
topics:
- Du'a
- Scholars
- Seerah
type: message
body: 'Shaykh Yaḥyā al-Ḥajūrī حفظه الله said:


  “My Lord, expand for me my chest, ease for me my affair, and untie the knot from
  my tongue so that they may understand my speech.”


  He said: “You have been granted your request, O Mūsā” — meaning: it has been answered
  for you.


  The Prophet of Allāh, Mūsā ﷺ, when Allāh عز وجل tasked him with conveying the message,
  Allāh inspired him with this supplication. This is because he ﷺ knew that when the
  chest becomes constricted, the tongue stumbles, and a person is unable to clearly
  express what he intends. Constriction of the chest prevents clarity of expression
  and proper articulation. Indeed, a constricted chest leads to confusion and to a
  lack of sound judgment in both speech and actions.


  [عنوان المحاضرة: اضرار ضيق الصدر والقلق وعلاجها]'

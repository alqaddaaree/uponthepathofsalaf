body: 'بـسمِ اللّٰـه الرَّحمـٰن الرَّحـيم


  **The majority of the scholars hold that depicting images of beings with souls is
  prohibited absolutely.**


  Among them is Imām Aḥmad, based on the generality of the evidences.


  Shaykh Ibn Bāz has a treatise titled “The Prohibition of Depicting Beings with Souls.”


  Shaykh Ḥammūd al-Tuwayjirī has a treatise titled “Proclaiming Denunciation Against
  Those Infatuated with Photography” — he has passed away, may Allah have mercy on
  him. It is a very valuable treatise.


  Shaykh Ibn Bāz wrote the introduction to this treatise and mentioned therein that
  the one who differentiated between photographic images and sculpted images — in
  other words, between images that have a shadow and those that do not — committed
  a grave error.


  Because the authentic aḥādīth encompass both types, as Shaykh Ibn Bāz رحمه الله
  states.


  This treatise was introduced by Shaykh Ibn Bāz, and he urged that it be read from
  beginning to end and that its meaning be understood.


  Then the criterion is the evidence, **and everyone’s statement is accepted or rejected
  except that of the Messenger of Allah ﷺ.**


  On this issue there is a large body of evidence proving its prohibition.


  Al-Bukhārī (5963) and Muslim (2110) narrated from Ibn ʿAbbās رضي الله عنهما that
  he said:


  > I heard the Messenger of Allah ﷺ say:


  “Whoever makes an image in this world will be commanded to breathe life into it
  on the Day of Resurrection, and he will not be able to do so.”


  The word “image” is indefinite in the context of a conditional clause, which indicates
  generality — whether one depicts an animal or a human, whether it has a shadow or
  does not.


  The one who makes images is imitating the Lord of the Worlds.


  Al-Bukhārī (5953) and Muslim (2111) narrated from Abū Hurayrah رضي الله عنه that
  he heard the Messenger of Allah ﷺ say:


  > “And who is more unjust than one who goes to create like My creation? Let them
  create a grain, or let them create an atom.”


  Muslim (969) narrated in his Ṣaḥīḥ from Abū al-Hayyāj al-Asadī who said: ʿAlī ibn
  Abī Ṭālib رضي الله عنه said to me: *“Shall I not send you on the same mission that
  the Messenger of Allah ﷺ sent me on? That you do not leave any statue without obliterating
  it, and no raised grave without leveling it.”*


  In another narration of Muslim: *“Nor any image except that you erase it.”*


  Al-Tirmidhī (2574) narrated from Abū Hurayrah رضي الله عنه that the Messenger of
  Allah ﷺ said:


  > “A neck will emerge from the Fire on the Day of Resurrection, having two eyes
  with which it sees, two ears with which it hears, and a tongue with which it speaks.
  It will say: ‘I have been entrusted with three: every tyrannical obstinate one,
  everyone who calls upon another deity besides Allah, and the image-makers.’”


  The ḥadīth is authentic.


  The evidences are general, whether the image is of an animal or a human, whether
  it has a shadow or does not, whether it is three-dimensional or not.


  As for that which has a shadow, al-Nawawī said in Sharḥ Ṣaḥīḥ Muslim:


  *“They unanimously agreed upon the prohibition of that which has a shadow and the
  obligation of changing it.”*


  As for that which does not have a shadow, such as images in cars, on walls, or on
  clothing, then it is prohibited according to what the evidences necessitate.


  Al-Nawawī attributed the prohibition in Sharḥ Ṣaḥīḥ Muslim to the majority of the
  scholars, and this is the view of Aḥmad.


  Al-Nawawī رحمه الله said in Sharḥ Ṣaḥīḥ Muslim:


  *“There is no difference in all of this — meaning in the prohibition — between what
  has a shadow and what does not have a shadow. This is a summary of our madhhab on
  the issue, and with its meaning spoke the vast majority of scholars among the Companions,
  the Tābiʿīn, and those after them. It is the madhhab of al-Thawrī, Mālik, Abū Ḥanīfah,
  and others.”*


  When it becomes clear that the majority are upon the prohibition of depicting beings
  with souls, whether they have a shadow or not:'

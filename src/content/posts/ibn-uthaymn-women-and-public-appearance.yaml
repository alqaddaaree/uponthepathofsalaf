title: 'Ibn ʿUthaymīn: Women and Public Appearance'
date: '2025-11-30T15:32:09'
author: عَلَىٰ نَهجِ السَّلَفِ  Upon the path of the Salaf
topics:
- women
type: message
body: 'Ibn Uthaymeen رحمه الله said:


  "If a woman is forbidden from stamping her feet, for fear that a man might be tempted
  by the sound of her anklets and the like, then how much more so is it forbidden
  to uncover her face?"


  [The Message of the Hijab (9)]


  > Tr: Umm ʿAbdirraḥmān as-Sūdāniyyah'

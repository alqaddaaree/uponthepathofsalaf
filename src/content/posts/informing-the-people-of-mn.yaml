body: '**Informing the People of ʾĪmān of the Detailed Ruling Regarding Sadness Over
  the Departure of Ramaḍān 🌙


  **


  The time of departure has drawn near, and just as we used to see messages of joy
  and longing, we now see messages of sadness and departure.


  People have differed regarding the ruling on feeling sad over its departure. Some
  said it is not allowed, others said feeling sadness at its departure is like joy
  at its arrival.


  The detailed answer is as follows:


  Firstly: The original ruling is to show joy, due to the statement of the Prophet
  ﷺ


  > «There are two joys for the fasting person: the joy when he breaks his fast, and
  the joy of when he meets his Lord.»


  Joy at breaking the fast is of two types.


  1️⃣ Joy at the time of ifṭār at the end of the daily fast, and this is a recurring
  joy throughout the month.


  2️⃣ Joy at the time of ʿĪd al-Fiṭr at the end of the monthly fast, and this is the
  final joy attached to breaking the fast. This is what is intended by the ḥadīth,
  and its meaning also includes the first [type].


  Know that people, in their joy, are two types:


  🔴 The first type:


  A joy that entails hatred of fasting and happiness at being relieved from it. This
  is nonexistent except with hypocrites.


  🟢 The second type:


  A joy that does not mean relief from something hated, but rather a transition from
  one joy to another.


  Accordingly, there are two joys:


  ● The joy of worship.


  ● The joy of completing worship.


  All of this is permissible and legislated without doubt, and it is what is intended
  in the ḥadīth.


  What remains is the summary of this situation: **Is it correct to feel sadness over
  the departure of Ramaḍān?**


  The answer is from two angles.


  The First Angle:


  The original ruling is to show joy, based on two evidences:


  1️⃣ The statement of Allāh:


  > "(He wants that you) must complete the same number (of days), and that you must
  magnify Allāh [i.e. to say Takbīr] for having guided you so that you may be grateful
  to Him."


  This indicates joy from two aspects:


  🌴 First: Takbīr


  The takbīr at the end of fasting contradicts the display of sadness; rather, it
  is a symbol of joy, celebration, and gladness.


  🌴 Second: Gratitude


  Gratitude is not for a calamity, but for a blessing — and a blessing necessitates
  joy, not sadness.


  2️⃣ Mentioned in the ḥadīth:


  > «There are two joys for the fasting person: the joy when he breaks his fast, and
  the joy of when he meets his Lord.»


  Just as you do not feel sadness at meeting your Lord, likewise you should not feel
  sadness at breaking your fast as the two joys are paired together.


  The Second Angle:


  Sadness is an incidental matter that opposes the foundation, and it has two cases.


  🚫 First case: That a person feels sad wishing Ramaḍān were longer, believing that
  this would be better. This sadness is invalid and a misguidance, because it opposes
  what Allāh has legislated, implying that something else is better than what Allāh
  decreed, and we seek refuge in Allāh.


  ✅️ Second case: That a person feels sad due to missing out on good because of his
  own shortcomings, negligence, or preoccupation. This is permissible, even if it
  comes late, as it is a form of regret over missing righteous deeds.


  However, its permissibility is conditional upon not publicizing or displaying this
  sadness, because the Sharīʿah commands takbīr and joy. **Thus, this is a private
  state that remains with the individual and should not extend to others.**


  *It was not from the way of the Salaf to display sadness during the days of ʿĪd
  at all; rather this contradicts their guidance.*


  Written by: [Abū al-ʿAbbās Anwar ibn Maḥmūd ar-Rifāʿī](https://t.me/anwar2015) 1441
  H


  Tr: Umm Tamīm aṣ-Ṣūmāliyyah'

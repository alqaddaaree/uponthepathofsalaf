title: If I Am Correct, Then the Credit Is Due to Allah
date: '2025-11-03T21:22:20'
author: عَلَىٰ نَهجِ السَّلَفِ  Upon the path of the Salaf
topics: []
type: message
body: If I am correct, then the credit is due to Allah. And if I am mistaken, then
  it is from myself and from Shaytan, for I am not infallible. And if I ever spread
  something that calls to other than the haqq or ṣawab, then I ask for sincere advice,
  and I pray for whoever advises and corrects me. May Allah reward you with goodness.

body: '##Side_Benefits@madrasatunaa


  **Rejoicing in Obedience to Allah**


  > Sheikh Rashad Adh-Dhali''ee hafidhahullah states:


  Muslim holidays come after acts of worship. In reality, they are a celebration of
  obeying Allah. This shows us that the greatest joy for a believer is obedience to
  Allah. That is why Allah made these holidays a time of happiness after performing
  great acts of worship.


  A believer’s happiness in this worldly life comes from obeying and worshipping Allah.
  When a person performs acts of worship properly, as Allah commanded, and is careful
  to fulfill them, they truly deserve to feel joy. Since this joy is based on obedience
  to Allah, Muslims should make these celebrations filled with obedience to Him. Their
  happiness on these days should come through good deeds, not through sins.


  It is not true gratitude to disobey Allah on such a day. It is not thankfulness
  to go against Allah’s commands on one of the greatest days of worldly life. Rather,
  a Muslim should remember Allah, thank Him for His blessings, humble themselves before
  Him, and reflect on His favour and kindness toward them.


  Source: https://t.me/madrasatunaa/284'

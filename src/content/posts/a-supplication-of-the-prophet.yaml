title: A Supplication of the Prophet ﷺ
date: '2026-03-06T17:09:41'
author: عَلَىٰ نَهجِ السَّلَفِ  Upon the path of the Salaf
quotedAuthor: al-Qayyim رحمه الله said in Ighāthat al-Lahfān (1/29):**
topics:
- death
- dua
- seerah
type: message
edited: '2026-03-06T17:26:55'
body: '**From the supplications of the Prophet ﷺ is that he used to say:**


  > “And I ask You for the coolness (comfort) of life after death.”


  Authenticated by al-Albānī in Takhrīj Kitāb as-Sunnah (no. 427) and by Imām al-Wādiʿī
  in Aṣ-Ṣaḥīḥ al-Musnad رحمة الله عليهما.


  **Ibn al-Qayyim رحمه الله said in Ighāthat al-Lahfān (1/29):**


  > “Since life in this worldly abode is never truly cool (comfortable) for anyone
  whatsoever; rather, it is filled with choking griefs and distress, and surrounded
  by inward and outward pains — he asked for the coolness of life after death"


  Tr: Umm ʿAbdirraḥmān as-Sūdāniyyah'

body: "**Women of the Salaf || نِسَاءُ السَّلَف**\n\n> \U0001F338 Shaykha Umm ʿAbdillāh\
  \ mentioned her father’s (Shaykh Muqbil) advice to Women:\n\nIt is upon the women\
  \ to study the biography of the Prophet Muḥammad ﷺ and the biographies of the female\
  \ companions who lived during the Prophet's time, such as Umm Sulaym and other virtuous\
  \ women of the Companions.\n\nFollow their example if you hope to attain Allāh's\
  \ pleasure and the Hereafter.\n\n[مقدمة والدي لـ نصيحتي للنساء].\n\n\uFEFF\n\n\uFEFF\
  ꧁─────────────────꧂ㅤㅤ\n\n\U0001F338 [Umm Zaynab Fāṭimah al-Baghdādiyyah](https://t.me/uponthepathofsalaf/190)\n\
  \n\U0001F338 [Umm Kulthūm bint ʿUqbah ibn Abī Muʿayṭ](https://t.me/uponthepathofsalaf/195)\n\
  \n\U0001F338 [Khadījah bint Khuwaylid](https://t.me/uponthepathofsalaf/221)"

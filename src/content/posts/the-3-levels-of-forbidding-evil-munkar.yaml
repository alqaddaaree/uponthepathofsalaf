body: '📌 **There are 3 levels of forbidding evil (munkar) from the ḥadīth of the Messenger
  of Allāh ﷺ:**


  > "Whoever amongst you sees an evil, he must change it with his hand; if he is unable
  to do so, then with his tongue; and if he is unable to do so, then with his heart;
  and that is the weakest form of ʾImān." Ṣaḥīḥ Muslim (49).


  **(1) Forbidding evil with the hand.**


  This is the strongest level, such as: Removing wine, breaking idols as the Prophet
  ʾIbrāhīm عليه السلام did, as well as with the Prophet ﷺ removing a gold ring from
  a man''s hand.


  **(2) Forbidding evil with the tongue.**


  This is done with wisdom and gentleness, unless the situation calls for harshness
  and severity. If one fears that this may lead to a greater evil, then he should
  move to the next level. As Shaykh al-ʾIslām Ibn Taymiyyah said: "No one has the
  right to remove an evil with something that is more evil than it." Kitāb al-Mustadrak
  ʿalā Majmūʿ al-Fatāwā (3/203).


  **(3) Forbidding evil with the heart.**


  This means to hate the munkar, distance oneself from it, and hate the people of
  it. This is obligatory and never falls away from the believer. It is the weakest
  of ʾĪmān, as mentioned by our beloved Prophet ﷺ.


  Note: Whenever you fear harm befalling you, move to the next level.


  📍 Benefit: **Should I advise even if I know they will not accept it?**


  Shaykh al-ʾIslām Ibn Taymiyyah (may Allāh have mercy on him) said in Kitāb al-Mustadrak
  ʿalā Majmūʿ al-Fatāwā (3/203-204): "If a man strongly believes that his enjoining
  good and forbidding evil will not be obeyed, is it still obligatory upon him? There
  are two opinions. The more correct of them is that it is obligatory, even if it
  is not accepted from him, as long as the evil of abandoning it does not outweigh
  the evil of doing it. This is like Nūḥ عليه السلام who remained calling his people
  for a thousand years minus fifty years." (End of quote)


  Advice: Do not belittle nor take lightly the matter of enjoining good and forbidding
  evil. Let us pay attention to this ḥadīth and act upon it. Let our advice be sincerely
  for the sake of Allāh, so that it may be accepted and bring about righteousness.


  The Prophet ﷺ said:


  > "Let none of you belittle himself. If he sees a matter concerning Allāh for which
  he should speak, and he does not speak, it will be said to him [on the Day of Resurrection]:
  ''What prevented you?'' He will say: ''Fear of the people.'' Then He (Allāh ﷻ) will
  say: ''Rather, it was Me you should have feared.''" Ibn Mājah (4008).


  How can we fear a mere rude glance or the loss of companionship? Do we not fear
  Allāh? By Allāh, this ḥadīth makes a person realize how much they have fallen short
  in this matter. Indeed, **it is Allāh we should fear.**


  Ibn al-Qayyim (may Allāh have mercy on him) said in his book Ṭarīq al-Hijratayn
  wa Bāb as-Saʿādatayn (p. 63):


  > "The truly happy and successful one is he who deals with Allāh concerning the
  people, and does not deal with the people concerning Allāh; who fears Allāh with
  regard to them, and does not fear them with regard to Allāh; who pleases Allāh even
  if it angers them, and does not please them at the cost of Allāh’s displeasure;
  who observes Allāh concerning them, and does not observe them concerning Allāh;
  who gives precedence to Allah over them, and does not give them precedence over
  Allāh..”


  This is how we ought to be! Do not worry about people turning away from you or being
  angry with you, as long as you are upon the Qurʾān and the Sunnah. Be gentle with
  the common people, be a sincere advisor, be close to them, make the Sunnah beloved
  to them, and make innovations hated to them.


  Allāh ﷻ said:


  > “Invite (mankind, O Muhammad صلى الله عليه و سلم) to the Way of your Lord (i.e.
  Islâm) with wisdom (i.e. with the Divine Revelation and the Qur’ân) and fair preaching,
  and argue with them in a way that is better..” [Sūrat an-Naḥl: 125]


  May Allāh make us among His sincere servants who call to the Sunnah of the Prophet
  ﷺ.


  Benefitted from the explanation of "Al-Ḥulal az-Zāhirah" by our Shaykha may Allāh
  preserve her.


  —Umm Tamīm aṣ-Ṣūmāliyyah'

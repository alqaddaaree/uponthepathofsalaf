body: '‘A’ishah (رضي الله عنها) said:


  كانَ النبيُّ ﷺ إذَا دَخَلَ العَشْر شَدَّ مِئْزَرَهُ، وأَحْيَا لَيْلَهُ، وأَيْقَظَ
  أهْلَهُ.


  “When the last ten (nights of Ramadan) began, the Prophet ﷺ would tighten his lower
  garment, spend the night in worship, and awaken his family.”


  Sahih al-Bukhari (2024), Sahih Muslim (1174)



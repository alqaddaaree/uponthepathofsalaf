body: '**Reciting the Qurʾān Hastily **


  It was narrated In “Ṣaḥīḥ al-Bukhārī”¹ from Qatādah, he said: Anas was asked: How
  was the recitation of the Prophet ﷺ? He said: «He would prolong the sounds in his
  recitation, then he recited “In the name of Allāh, the most Gracious, the most Merciful,”
  prolonging ‘Bismillāh’, ‘ar-Raḥmān’, and ‘ar-Raḥīm’.»


  *_


  ***Explanation:**


  The ḥadīth indicates that the Prophet''s ﷺ recitation was characterized by elongation
  (madd).


  Ibn al-Mulaqqin said: "His Lord—Glorified and Exalted be He—commanded him to recite
  with careful recitation [tartīl] and to recite it deliberately, and not to move
  his tongue hastily with it, so he complied to his Lord''s command and would recite
  it at a measured pace, to show his Ummah how they should recite and how they should
  reflect upon the Qurʾān and understand it."²


  That was how the recitation of the Prophet ﷺ was—both within the prayer and outside
  of it—and it must be taken as a model to follow.


  Ibn ʿAbbās –may Allāh be pleased with them– said: «To recite Sūrat al-Baqarah and
  āl-ʿImrān with a measured pace and reflection is more beloved to me than reciting
  the entire Qur’ān hastily."³


  *____


  *1) Narrated by Buhkārī (5046).


  2) At-Tawḍīḥ in explaining al-Jāmi‘ aṣ-Ṣaḥīh (24/154).


  3) Reported by al-Bayhaqī in Al-Kubrā (4490).


  > Book: From the Mistakes of those who Fast by Sheikh Faiṣal al-Ḥāshidī


  Tr: Umm Tamīm aṣ-Ṣūmāliyyah'

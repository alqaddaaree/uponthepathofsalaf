body: 'Your reward with Allah, to do what Allah commanded you with towards them and
  gain the reward for it.


  Reflect deeply when you say:


  *حَسْبِيَ اللَّهُ وَنِعْمَ الْوَكِيل*


  What does **ḥasbiyallāh** mean?


  It means **Allah is sufficient for me.** Allah is enough for me against everything.
  Enough for me against all creation. **I am in need of no one if Allah is with me.**


  والله ما خاب من كان الله معه


  **By Allah, the one who has Allah with him is never lost.**


  What do you need if Allah is with you?


  The Prophet ﷺ said to Ibn ʿAbbās رضي الله عنهما:


  > واعلم أنَّ الأُمّة لَو اِجتَمَعَت عَلَىٰ أن يَنفَعُوكَ بِشَيءٍ لَنْ يَنْفَعُوكَ
  إِلَّا بِشَيْءٍ قَدْ كَتَبَهُ اللَّهُ لَكَ، وَلَو اِجتَمَعُوا عَلَىٰ أن يَضُرُّوكَ
  بِشَيءٍ لَنْ يَضُرُّوكَ إِلَّا بِشَيْءٍ قَدْ كَتَبَهُ اللَّهُ عَلَيْكَ


  “And know that if the entire ummah were to gather together to benefit you with something,
  they would not benefit you except with something that Allah has already written
  for you. And if they were to gather together to harm you with something, they would
  not harm you except with something that Allah has already written against you.”


  *People can do nothing except carry out what Allah has already decreed for you.*


  That is it.


  Do not depend on people.


  Yes, it hurts. And pain is real. Many have walked this path and felt this weight.


  **But Allah is enough.**


  If you want peace in a world full of deficiency—then let Allāh be enough for you.


  You want provision? **Allāh is Ar-Razzāq.**


  You want mercy? **Allāh is Ar-Raḥmān, Ar-Raḥīm.**


  Your heart is broken? **Allāh is Al-Jabbār.**


  You want to be heard? **Allāh is As-Samīʿ.**


  You want an answer? **Allāh is Al-Mujīb.**


  You want a spouse, children, gifts? **Allāh is Al-Wahhāb.**


  What more do you want?


  You were not created for this world.


  *You are meant to feel estranged here.*


  You belong in Jannah إن شاء الله.


  Allāh describes it:


  *﴿وُجُوهٌ يَوْمَئِذٍ نَاعِمَةٌ ۝ لِسَعْيِهَا رَاضِيَةٌ ۝ فِي جَنَّةٍ عَالِيَةٍ ۝
  لَا تَسمَعُ فِيهَا لَاغِيةً ۝ فِيهَا عَيْنٌ جَارِيَةٌ ۝ فِيهَا سُرُرٌ مَّرْفُوعَةٌ 
  ۝ وَأَكْوَابٌ مَّوْضُوعَةٌ  ۝ وَنَمَارِقُ مَصْفُوفَةٌ  ۝ وَزَرَابِيُّ مَبْثُوثَةٌ ﴾


  " [other] faces that day will show pleasure, with their effort [they are] satisfied,
  in an elevated garden, wherein they will hear no unsuitable speech, within it is
  a flowing spring, within it are couches raised high, and cups put in place, and
  cushions lined up, and carpets spread around"* [Al-Ghāshiyah: 8-16]


  **That** is where you belong—by Allah’s permission.


  And then Allah says:


  *{أَفَلَا يَنظُرُونَ إِلَى الْإِبِلِ كَيْفَ خُلِقَتْ  ۝ وَإِلَى السَّمَاءِ كَيْفَ
  رُفِعَتْ  ۝ وَإِلَى الْجِبَالِ كَيْفَ نُصِبَتْ  ۝ وَإِلَى الْأَرْضِ كَيْفَ سُطِحَتْ}


  " Then do they not look at the camels – how they are created? And at the sky – how
  it is raised? And at the mountains – how they are erected? And at the earth – how
  it is spread out?"* [Al-Ghāshiyah: 17-20]


  The One who created all of this—**will He not be enough for you?**


  Let Allah be sufficient for you.


  Wallāhi, you do not need people.


  You need Allah.


  And though you may find moments of comfort with people—**true solace is with Allah.**


  The salaf used to say:


  لو علم الملوك وأبناء الملوك ما نحن فيه من النعيم لجالدونا عليه بالسيوف


  "If the kings and the sons of kings knew the sweetness we are in, they would fight
  us for it with swords."


  *let your only concern be how to please the Lord of the worlds. *


  Rely on Him and He will suffice you.


  *{وَمَنْ يَتَوَكَّلْ عَلَى اللهِ فَهُوَ حَسْبُهُ}


  "And whoever relies upon Allah — then He is sufficient for him" [At-Talāq: 3]*


  > - كتبته أُمُّ عَبدِالرَّحمـٰن السُّودَانِيّة — غفر الله لها


  ٢٣ رجب ١٤٤٧هـ'

body: '**📌 The Virtue of the First Ten Days of Dhul-Ḥijjah**


  • Al-Ḥāfiẓ Ibn Rajab رحمه الله said:


  “Indeed the month of Dhul-Ḥijjah is the best of the sacred months, as it is the
  greatest of them in sanctity.”


  **Fatḥ al-Bārī (20/9)**


  • Imām Ibn al-Qayyim رحمه الله said:


  “The best deed during the ten days of Dhul-Ḥijjah is to increase in acts of worship—especially
  takbīr (saying Allāhu akbar), tahlīl (lā ilāha illallāh), and taḥmīd (Alḥamdulillāh).
  This is better than jihād that is not individually obligatory.”


  **Madārij as-Sālikīn (1/110)**


  • Al-Ḥāfiẓ Ibn Rajab رحمه الله said:


  “As for the voluntary deeds in the ten days of Dhul-Ḥijjah, they are better than
  the voluntary deeds in the last ten nights of Ramaḍān. Likewise, the obligatory
  deeds in the ten of Dhul-Ḥijjah are multiplied more than obligatory deeds in other
  times.”


  **Fatḥ al-Bārī (9/16)**


  • Al-Ḥāfiẓ Ibn Ḥajar رحمه الله said:


  “What appears to be the reason for the distinction of the ten days of Dhul-Ḥijjah
  is that the major acts of worship are all gathered in them: prayer, fasting, charity,
  and Ḥajj—and this does not occur at any other time.”


  **Fath al-Bārī (2/460)**


  • Shaykh al-Islām Ibn Taymiyyah رحمه الله said:


  “Spending the ten days of Dhul-Ḥijjah fully in worship—night and day—is better than
  jihād in which one does not sacrifice his life and wealth. Worship at other times
  equals jihād due to the authentic well-known narrations.”


  **Al-Fatāwā al-Kubrā (5/343)**


  Tr: Umm ʿAbdirraḥmān as-Sūdāniyyah'

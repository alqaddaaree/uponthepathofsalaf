title: 'Ibn al-Qayyim: Complaining to Allah, Not to People'
date: '2026-02-14T15:45:11'
author: عَلَىٰ نَهجِ السَّلَفِ  Upon the path of the Salaf
topics:
- dua
- patience
- trials
type: message
body: 'Al-Imām Ibn al-Qayyim رحمه الله says:


  "Complaining to Him—Glorified is He—does not contradict beautiful patience. Rather,
  the servant turning away from complaining to anyone else entirely, and directing
  his complaint solely to Him, **is patience.**


  Allāh—Glorified is He—tests His servant to hear his complaint, his pleading, and
  his supplication. He has condemned those who do not humble themselves before Him
  and do not submit to Him at the time of trial, as He said:


  ﴾And indeed We seized them with punishment, but they did not humble themselves to
  their Lord, nor did they invoke (Allāh) with submission to Him.﴿


  [Surat Al-Mu''minūn: 76]


  The servant is too weak to pretend to be patient and self-sufficient before his
  Lord. The Lord—Exalted is He—does not want His servant to pretend patience before
  Him. Rather, He wants him to submit and plead to Him. He—Exalted is He—detests the
  one who complains about Him to His creation, and He loves the one who complains
  of his condition to Him."


  ''Uddat aṣ-Ṣābirīn wa dhakhīrat ash-Shākirīn (Page 63)''


  > Tr: Umm Tamīm aṣ-Ṣūmāliyyah'

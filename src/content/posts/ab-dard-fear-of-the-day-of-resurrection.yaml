title: 'Abū Dardā: Fear of the Day of Resurrection'
date: '2025-12-24T04:36:55'
author: عَلَىٰ نَهجِ السَّلَفِ  Upon the path of the Salaf
quotedAuthor: ''
topics:
- Knowledge
type: message
body: 'Abu Darda رضي الله عنه said:


  "Indeed, my greatest fear concerning standing on the Day of Judgement is that it
  will be said to me: You have learned, hence what have you done with your knowledge?"


  (Jami'' Al-Bayan al-''Ilm wa Fadlih, No. 647)'

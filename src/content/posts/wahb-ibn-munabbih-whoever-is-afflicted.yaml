body: 'Wahb ibn Munabbih (رحمه الله) said:


  **مَنْ أُصِيبَ بِشَيْءٍ مِنَ الْبَلَاءِ فَقَدْ سُلِكَ بِهِ طَرِيقَ الْأَنْبِيَاءِ**


  “Whoever is afflicted with any form of trial; has indeed been set upon the path
  of the Prophets.”


  Ḥilyat al-Awliyā: 4/56


  Learn about the Salaf:



body: 'Bakr ibn ‘Abdullāh al-Muzanī (رحمه الله) said:


  **إياك من الكلام ما إن أصبت فيه لم تؤجر، وإن أخطأت فيه أثمت، وهو سوء الظن بأخيك!**


  “Beware of speech such that, if you are correct in it, you are not rewarded, and
  if you are mistaken in it, you incur sin. That is having bad thoughts about your
  brother.”


  Tahdhīb at-Tahdhīb (1/484)


  Learn about the Salaf:


  https://t.me/gemsofthesalaf'

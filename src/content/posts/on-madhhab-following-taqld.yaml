body: '**On Madhhab-following (Taqlīd of a school of thought):**


  Know, O woman who calls to Allah and teaches (may Allah grant you success), that
  adhering to a madhhab (school of thought) has no basis in the Sharīʿah. The matter
  is about following the Qur’an and the Sunnah. These madhāhib came later. Imām al-Bukhārī
  did not belong to any of the madhāhib, nor did Imām Muslim, nor others from the
  earlier generations. There was no affiliation to a person. They did not ascribe
  themselves to Abū Bakr al-Ṣiddīq, nor to ʿUmar, nor to ʿUthmān, nor to ʿAlī. Thus,
  madhhab-following is something Allah has not sent down any authority for.


  And praise be to Allah who has made us see the truth and made madhhabism and partisanship
  hateful to us.


  Indeed, among the blind followers of madhhabs are those who even reject clear evidence.
  It is said to them: The Messenger of Allah ﷺ said such and such. They reply: But
  my madhhab is Mālikī, or Shāfiʿī… Did Allah command us to follow the Mālikī madhhab,
  or the Shāfiʿī, or the Ḥanafī, or the Ḥanbalī? And they reject evidence simply because
  their madhhab is different.


  But Allah the Exalted says:


  **“Follow what has been sent down to you from your Lord, and do not follow other
  guardians besides Him. Little do you remember.”**


  (Sūrat al-Aʿrāf 7:3)


  And He says:


  **"So let those beware who oppose his command, lest a trial befall them or a painful
  punishment befall them.”**


  (Sūrat al-Nūr 24:63)


  And praise be to Allah who has saved us from the trial of partisanships.


  And my father (may Allah have mercy on him) said in response to a question (Fatāwā
  al-Ḥaramayn, no. 490):


  > “These madhhabs are a bidʿah with which Allah tested Islām. And I know that many
  of the doctors, and many of the wearers of cloaks, and many of those with turbans
  do not like my statement. But if I please my Lord, I do not care about their anger.”


  Therefore, it is upon the woman who calls to Allah and teaches to be keen on attaching
  the students and those she calls to the evidences, and never to shift away from
  them to the statement of so-and-so or the madhhab of so-and-so—while maintaining
  respect and reverence for the scholars.


  **– Shaykha Umm ʿAbdillāh al-Wādiʿiyyah (may Allah preserve her)


  **


  > Tr: Umm ʿAbdirraḥmān as-Sūdāniyyah'

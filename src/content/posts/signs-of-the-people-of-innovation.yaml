body: "**From the signs of the people of innovation:** **Rebellion against the rulers.**\n\
  \n*by: Shaykhah Umm ʿAbdillāh al-Wādiʿiyyah —حفظها الله—*:\n\nAl-Dārimī narrated\
  \ in his Sunan (no. 100) and al-Ājurrī in ash-Sharīʿah (no. 135) from Abū Qilābah,\
  \ who said:\n\n> “No man introduces an innovation except that he deems the sword\
  \ lawful.”\n\n\uFEFF\n\nThis report is authentic—meaning rebellion against oppressive\
  \ rulers.\n\nThis is among the consequences and evils of innovations. **No one rebels\
  \ against the rulers except one who is upon innovation.** As for the one who is\
  \ upon the Sunnah, he is the furthest of people from rebelling against the rulers.\n\
  \nEveryone who rebels against an unjust ruler has within him a Khariji, Muʿtazili\
  \ inclination—whether from the Shīʿah, the Ikhwān al-Muslimīn, or others. This method\
  \ is among the most prominent reprehensible traits of the people of innovation:\
  \ rebelling against oppressive rulers and inciting the people to do so. This is\
  \ contrary to the Sharīʿah and contrary to the sound aqīdah.\n\nImām al-Ṭaḥāwī—رحمه\
  \ الله—said in al-ʿAqīdah aṭ-Ṭaḥāwiyyah:\n\n> “We do not hold the view of rebelling\
  \ against our leaders and those in authority over us, even if they are unjust.\n\
  \nWe do not supplicate against them, nor do we withdraw our hand from obedience\
  \ to them.\n\nWe consider obedience to them to be obedience to Allāh, the Mighty\
  \ and Majestic, an obligation, so long as they do not command disobedience.\n\n\
  And we supplicate for them for rectitude and well-being.”\n\nThe Prophet ﷺ commanded\
  \ listening and obedience to the ruler, warned against rebelling against him, commanded\
  \ patience over his injustice, and commanded that the neck of the one who rebels\
  \ against the ruler be struck.\n\nAl-Bukhārī (no. 3793) narrated from Anas ibn Mālik\
  \ رضي الله عنه that the Prophet ﷺ said to the Anṣār:\n\n> “You will see after me\
  \ selfishness (i.e., leaders giving preference to themselves) and matters which\
  \ you will disapprove of. so be patient until you meet me, for your appointment\
  \ is at the Ḥawḍ (the basin).”\n\nImām Muslim narrated in his Ṣaḥīḥ (no. 1846) from\
  \ Wāʾil ibn Ḥujr al-Ḥaḍramī رضي الله عنه that Salamah ibn Yazīd al-Juʿfī asked the\
  \ Messenger of Allāh ﷺ, saying:\n\n*\"O Messenger of Allāh, what do you think if\
  \ rulers rise over us who demand their rights from us but withhold our rights—what\
  \ do you command us?”*\n\nHe turned away from him. Then he asked him again, and\
  \ he turned away. Then he asked him a second or third time, so al-Ashʿath ibn Qays\
  \ pulled him and said:\n\n> “Listen and obey, for upon them is what they are burdened\
  \ with, and upon you is what you are burdened with.”\n\nThe people of innovation\
  \ are a source of misfortune for the servants and the lands—in their calling, their\
  \ teaching, and their revolutions—by distancing people from holding firmly to their\
  \ religion. And the Messenger of Allāh ﷺ spoke truth when he said:\n\n> “Indeed,\
  \ the thing I fear most for my Ummah is the misguided leaders.”\n\nNarrated by Ibn\
  \ Abī ʿĀṣim in as-Sunnah.\n\nWhat occurs of revolutions, rebellion against the ruler,\
  \ and igniting the fires of tribulation is due to ignorance of the correct aqīdah—the\
  \ aqīdah of the righteous predecessors (as-salaf aṣ-ṣāliḥ).\n\n**\n\nLearning the\
  \ aqīdah from its pure source is a fortress against tribulations, a source of safety\
  \ and security, and a great happiness in this world and the next.**\n\n**And this\
  \ is something that is incumbent upon us:** to learn the aqīdah—the aqīdah of the\
  \ prophets and messengers—so that we may attain Paradise and tread the path of salvation\
  \ at a time when tribulations are like pieces of a dark night.\n\n> translation:\
  \ umm ʿabdirraḥmān as-sūdāniyyah غفر الله لها"

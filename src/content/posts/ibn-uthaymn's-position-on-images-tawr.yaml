body: '**The Position of al-ʿAllāmah Muḥammad ibn ʿUthaymīn on Image Making**


  By the shaykh ʿAbdurraḥmān al-Barrāk.


  Translated by ʿAbdurraḥmān al-Qaddārī.


  Very important. Please share it.


  الدال على الخير كفاعله.


  May Allāh reward whoever suggested this to us. You''ve made a great suggestion.


  بارك الله فيك.'

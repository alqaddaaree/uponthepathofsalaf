type: message
body: '🔸 **From what has been said about brotherhood for the sake of Allāh: **


  "The example of two brothers: when they meet, they are like two hands washing one
  another."


  Shaykh al-Islām said:


  “Indeed the believer to another believer is like two hands washing one another.”


  (Majmūʿ al-Fatāwā 28/53)


  **From what has been said about brotherhood for the sake of Allāh:**


  “The example of brotherhood for Allāh’s sake is like the hand and the eye: If the
  eye sheds tears, the hand wipes them; and if the hand is in pain, the eye weeps
  for it.”


  **From what has been said about brotherhood:**


  “The soul has never attained a desire


  more delightful than the affection of a trustworthy friend.


  Whoever is deprived of the love of a righteous brother —


  it is he who''s aorta has been cut.”


  forwarded from:


  [Shaykh Abū ʿĀmir ʿAbdullāh al-Ḥakami](https://t.me/amaAlhkme/2446)


  > Tr: Umm ʿAbdirraḥmān as-Sūdāniyyah'

body: 'یَقُولُ یَـٰلَیۡتَنِی قَدَّمۡتُ لِحَیَاتِی


  He will say: "Alas! Would that I had sent forth (good deeds) for (this) my life!"


  > Sūrah Al-Fajr: 24, Tr. Al-Hilali & Khan'

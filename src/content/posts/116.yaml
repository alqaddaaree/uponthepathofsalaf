body: '**The Virtues of Sending Salutations on the Prophet ﷺ**


  > Ubayy ibn Kaʿb reported: I said, “O Messenger of Allah, I frequently send salutations
  upon you. How much of my prayers (duʿāʾ) should I assign for making supplications
  for you?” The Prophet ﷺ said, “As you wish (whatever portion you desire).” I said,
  “A fourth?” The Prophet ﷺ said, “As you wish, (whatever portion you desire Ubayy)
  but if you were to add to this, this is better for you.” I said, “A half?” The Prophet
  ﷺ said, “As you wish, (whatever portion you desire Ubayy) but if you were to add
  to this, this is better for you.” I said, “Two-thirds?” The Prophet ﷺ said, “As
  you wish, (whatever portion you desire Ubayy) but if you were to add to this, this
  is better for you.” I said, “Should I say all of my prayers for blessings upon you?”
  The Prophet ﷺ said, “If so, your worries will be resolved, and your sins will be
  forgiven.”


  [Sunan al-Tirmidhī 2457]


  So the entire time—in the times that you make duʿāʾ—instead of making duʿāʾ for
  yourself, or your family members or anything of that nature, you are turning that
  entire time into time in which you are sending ṣalāt upon the Messenger ﷺ.


  If this is the case, you will be forgiven of your sins and whatever you have of
  worries will be sufficed. *Subḥanallāh*, only by sending salutations upon the Prophet
  ﷺ — the one sent as an Imām and a leader for us, the one sent to remove us from
  darkness into the light — repeating this in the time of your duʿāʾ, and giving your
  entire time of duʿāʾ for yourself to him ﷺ you will be sufficed of your worries.


  **How many worries do we have?**


  We know within the depths of ourselves there are things that bother us: family troubles,
  financial issues, personal struggles, illnesses.


  By designating your entire time of supplication to the Prophet ﷺ, then you find
  Allāh ﷻ suffices you of your worries. Not only that, but you are forgiven of your
  sins!


  And how in need are we to be forgiven of our sins, not just in this period (the
  blessed month of Ramaḍān), but throughout the year.


  > Sheikh Abū ʿAtiyyah الله يحفظه; taken from a post-ʿishāʾ reminder


  - Umm Muṣʿab al-Ghāniyyah al-Almāniyyah'

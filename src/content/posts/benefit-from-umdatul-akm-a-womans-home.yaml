title: Benefit from ʿUmdatul Aḥkām – A Woman’s Home
date: '2026-04-07T19:45:00'
author: عَلَىٰ نَهجِ السَّلَفِ  Upon the path of the Salaf
topics:
- marriage
- scholars
- trials
- women
type: message
body: '*A nice benefit taken from today’s dars on ʿUmdatul Aḥkām by Umm ʿAbdillāh
  Shahīdah حفظها الله


  *


  **At-tabarruj**: كثرة الخروج بغير حاجة — it is women leaving the house a lot without
  necessity (adorning yourself with improper clothing is also included in the definition).


  وَقَرْنَ فِى بُيُوتِكُنَّ وَلَا تَبَرَّجْنَ تَبَرُّجَ ٱلْجَـٰهِلِيَّةِ ٱلْأُولَىٰ


  *“And stay in your houses, and do not display yourselves like that of the times
  of ignorance”*


  Ibn Kathīr commented on the āyah* [Sūrah Al-Aḥzāb:33] *with this definition, as
  said by the Tābiʿī Mujāhid ibn Jabr. It is also defined as this in the books of
  لغة.


  This phrase is now generally not used with its original meaning. When one says ‘tabarruj’
  or ‘mutabarrijah’ they mean a woman who wears incorrect jilbāb or displays her adornments.
  However, the aṣl of tabarruj is frequently leaving the home without need.


  Therefore, even if she is covered properly with the sharʿī clothing but she is out
  and about everyday (without necessity), then **this is at-tabarruj.**


  What is worse is when she’s out of the house a lot *and* not covered properly.


  Leaving the house everyday (even if you are wearing the correct jilbāb) is a fitnah.


  The wives of the shuyūkh do not go out. They may only go to the masjid and then
  come straight back. This is due to their baṣīrah—they fully understand the commands
  of Allāh ﷻ and what it leads to when they are not upheld.


  The Shaykha mentioned that she saw Sheikh Muqbil’s wife only once, on ʿeid, however
  she did not stay long and had to return back home soon after. In regards to Sheikh
  Yaḥyā’s wives: “you don’t see his wives” and this is how it is with the other shuyūkh.


  والله المستعان


  - أم مصعب الغانية الألمانية'

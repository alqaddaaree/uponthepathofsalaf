body: 'ʿIkrimah – may Allāh have mercy upon him – said:


  “**Everyone gets happy and gets sad, but you should turn your happiness into gratitude
  [to Allāh] and your sadness into patience (ṣabr).**”


  [Tafsīr Ibn Kathīr, Al-Ḥadīd: 23]


  ##Patience


  Learn about the Salaf:


  https://t.me/gemsofthesalaf'

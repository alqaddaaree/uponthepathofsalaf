title: The Prophet ﷺ on Gentleness
date: '2026-03-13T23:37:04'
author: عَلَىٰ نَهجِ السَّلَفِ  Upon the path of the Salaf
topics:
- hadith
- seerah
type: message
body: '**The Messenger of Allah ﷺ said:**


  > إنَّ الرِّفْقَ لا يَكونُ في شَيءٍ إلَّا زانَهُ، ولا يُنْزَعُ مِن شَيءٍ إلَّا شانَهُ.


  “Gentleness is not present in anything except that it beautifies it, and it is not
  removed from anything except that it disgraces it.”


  Ṣaḥīḥ Muslim (2594)'

body: '**How to Achieve Sincerity When Seeking Knowledge**


  ʾImām Aḥmad -may Allāh have mercy on him- said: **«Knowledge is equaled by nothing
  for the one whose intention is sound.»** They asked: "And how does one''s intention
  become sound, O Abā ʿAbdillāh?" He replied: **«He intends to remove ignorance from
  himself and from others.»**


  If one asks: How is sincerity achieved in seeking knowledge?


  We say: Sincerity in seeking knowledge is achieved by intending the following matters:


  • The First Matter: Fulfilling the command of Allāh, as Allāh the Exalted has commanded
  it. He said:


  > "So know (O Muḥammad ﷺ) that, Lā ilāha illallāh (none has the right to be worshipped
  but Allāh), and ask forgiveness for your sin..” [Sūrat Muḥammad: 19]


  And He—Glorified and Exalted is He—encouraged knowledge. Encouraging something necessitates
  loving it, being pleased with it, and commanding it.


  • The Second Matter: Preserving the Shari''ah of Allāh, as it is achieved through
  learning, memorization in the chest, and through writing.


  • The Third Matter: Protecting the Shariʿah and defending it. For were it not for
  the scholars, the Shariʿah would not be protected, nor would anyone defend it. We
  see, for example, Shaykh al-ʾIslām Ibn Taymiyyah and other scholars who faced the
  people of innovation and exposed the falsehood of their innovations. We can see
  they obtained abundant good.


  • The Fourth Matter: Following the Shariʿah of Muḥammad ﷺ, for you cannot follow
  his Shariʿah unless you know it.


  These are four matters, all of which are encompassed by our statement: **Sincerity
  to Allāh is obligatory in seeking knowledge.**


  Sharḥ Ḥilyat Ṭālib al-ʿIlm (p.16-17)


  Tr: Umm Tamīm aṣ-Ṣūmāliyyah'

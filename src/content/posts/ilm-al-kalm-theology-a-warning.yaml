body: '**ʿIlm al-Kalām**


  *By Ash-Shaykha Umm ʿAbdillah Al-Wādiʿiyyah حفظها الله


  *


  **She said:**


  I asked my father رحمه الله: “What is ʿIlm al-Kalām?”


  He replied: ʿIlm al-Kalām is a set of methods and rules by which they claim to arrive
  at knowing the ‘aqīdah.


  Then he رحمه الله clarified that ʿIlm al-Kalām is blameworthy, and he said:


  **Ash-Shāfiʿī رحمه الله said:**


  > “My view and my stance regarding the people of Kalām is that they should be beaten
  with palm branches, then made to ride on camels, and paraded among the tribes and
  clans, and it should be announced over them: This is the punishment of the one who
  abandoned the Book and the Sunnah and turned to ʿIlm al-Kalām.”


  *(Reported by Abū Nuʿaym Ahmad ibn ʿAbdullah in Ḥilyat al-Awliyāʾ 9/104)*


  The great scholars of Kalām themselves admitted that ʿIlm al-Kalām leads to confusion
  and results in doubts.


  **Muhammad ibn ''Umar ar-Rāzī said:**


  نِهَايَةُ إِقْدَامِ الْعُقُولِ عِقَالُ *** وَأَكْثَرُ سَعْيِ الْعَالَمِينَ ضَلَالُ


  وَأَرْوَاحُنَا فِي وَحْشَةٍ مِّنْ جُسُومِنَا *** وَحَاصِلُ دُنْيَانَا أَذًى وَوَبَالُ


  وَلَمْ نَسْتَفِدْ مِنْ بَحْثِنَا طُولَ عُمْرِنَا *** سِوَى أَنْ جَمَعْنَا فِيهِ
  قِيلَ وَقَالُوا


  "The end result of advancing the intellect is restriction. And the majority of the
  efforts of mankind lead to misguidance. Our souls remain estranged from our bodies.
  And all we gained from this world is harm and burden. We did not gain from our lifelong
  research except compiling “so-and-so said” and “they said.”"


  **Then he said:**


  “I have reflected upon the paths of the theologians and the methods of the philosophers,
  and I did not find them to cure any sick person, nor to quench any thirsty one.”


  It is said that **Abū Ḥāmid al-Ghazālī** and **Muhammad ibn ''Umar ar-Rāzī** repented,
  but even if that was the case, their poisonous books remained.


  **Ash-Shahrastānī said:**


  لَعَمْرِي لَقَدْ طُفْتُ الْمَعَاهِدَ كُلَّهَا *** وَسَيَّرْتُ طَرْفِي بَيْنَ تِلْكَ
  الْمَعَالِمِ


  فَلَمْ أَرَ إِلَّا وَاضِعًا كَفَّ حَائِرٍ *** عَلَى ذَقَنٍ أَوْ قَارِعًا سِنَّ نَادِمٍ


  "By my life, I have wandered through all the places of knowledge, and surveyed all
  of their landmarks, and I saw none except one placing his hand on his chin in bewilderment,
  or striking his teeth in regret."


  **Imām aṣ-Ṣanʿānī responded:**


  لَعَلَّكَ أَهْمَلْتَ الطَّوَافَ بِمَعْهَدِ *** الرَّسُولِ وَمَنْ لَاقَاهُ مِنْ كُلِّ
  عَالِمِ


  فَمَا حَارَ مَنْ يُهْدَى بِهَدْيِ مُحَمَّدٍ *** وَلَسْتَ تَرَاهُ قَارِعًا سَنَّ
  نَادِمِ


  "Perhaps you neglected to make rounds in the institution of the Messenger, and those
  scholars who met him and received from him. For no one is ever confused who is guided
  by the guidance of Muhammad, and you will never see him striking his teeth in regret."


  End of Shaykh Muqbil''s words.


  **She said:**


  **I say:**


  The scholars have agreed upon criticizing the people of Kalām.


  *Ibn ʿAbd al-Barr رحمه الله said in Jāmiʿ Bayān al-ʿIlm wa-Faḍlihi (2/942):*


  “The scholars of fiqh and the people of narrations in all regions have agreed that
  the people of Kalām are people of innovation and deviation. They are not counted
  among the ranks of the scholars. Rather, the scholars are the people of athar and
  understanding of it, and they excel over each other in precision, skill, and comprehension.”


  > Tr: Umm ʿAbdirraḥmān as-Sūdāniyyah'

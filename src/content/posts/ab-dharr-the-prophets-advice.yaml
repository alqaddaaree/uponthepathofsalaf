title: 'Abū Dharr: The Prophet’s ﷺ Advice'
date: '2026-02-22T19:32:51'
author: عَلَىٰ نَهجِ السَّلَفِ  Upon the path of the Salaf
topics:
- hadith
- seerah
- women
type: message
body: 'Abū Dharr al-Ghifārī رضي الله عنه narrated that the Messenger of Allah ﷺ said:


  **“Indeed, I see what you do not see, and I hear what you do not hear. The sky has
  creaked, (أطَّت) and it has every right to creak.** [meaning it produced a sound
  and groaned; aṭīṭ refers to the sound made by camels, or the sound of saddles] **There
  is no space the width of four fingers in it except that an angel has placed his
  forehead there in prostration to Allah.** [meaning that the vast number of angels
  in the sky has weighed upon it until it creaked.] **By Allah, if you knew what I
  know,** [if you were to know what I know of the enormity, terror, and severity of
  the matter] **you would laugh little and weep much; you would not take pleasure
  with women upon beds,** [meaning you would find no ease or enjoyment in intimacy
  with your wives because of fear, panic, and the severity and horror of the matter.]
  **and you would go out to the open places** [you would leave your homes and go out
  into roads and pathways] **crying out to Allah.** [you would supplicate humbly to
  Allah, begging Him to save you, forgive you, and pardon you.]”


  Abū Dharr said:


  **“I wish that I were a tree that is cut down.”** [Meaning: I would have wished
  to be a tree that is cut and uprooted from its place, so that it perishes and comes
  to an end.]


  graded: ḥasan gharīb


  **— Sunan at-Tirmidhi (2312)**


  [dorar.net](https://dorar.net/hadith/sharh/62469)


  Tr: Umm ʿAbdirraḥmān as-Sūdāniyyah'

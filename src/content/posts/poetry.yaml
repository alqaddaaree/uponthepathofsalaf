title: 'إِنَّ الكَرِيمَ إِذَا نَادَيْتَ قَالَ : نَعَمْ – Poetry'
date: '2026-02-10T14:46:37'
author: عَلَىٰ نَهجِ السَّلَفِ  Upon the path of the Salaf
topics: []
type: message
body: '**إِنَّ الكَرِيمَ إِذَا نَادَيْتَ قَالَ : نَعَمْ


  ‏فَكَيْفَ بِاللهِ ذِي الإِنْعَامِ وَالكَرَمِ؟**


  *When you call upon a generous person, he says, “Yes.” So what about Allāh, the
  One full of blessings and generosity?*


  ‏**فَابْسُطْ لَهُ الكَفَّ لَنْ تَأْتِيكَ فَارِغَةً


  ‏فَقَدْ سَأَلْتَ الذِي سَوَّاكَ مِنْ عَدَمِ.**


  *So raise your hands to Him — they will not return empty, for you are asking the
  One who created you from nothing.


  *



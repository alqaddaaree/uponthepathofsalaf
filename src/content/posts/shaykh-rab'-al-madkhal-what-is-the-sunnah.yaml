edited: '2026-03-31T23:04:02'
body: '**Shaykh Rabī'' Al-Madkhali رحمه الله said:**


  As for what is called “religious nasheeds,” then these—of course—the Salaf did not
  have such nasheeds.


  The Salaf had ḥidāʾ (travel chants), and they had poetry that served Islam, and
  the way they recited it and spoke with it was different from the method of nasheeds.


  This method that is used today in nasheeds is taken from the Christians, taken from
  the Rāfiḍah, and taken from the Ṣūfiyyah.


  These nasheeds were adopted by some groups, and they became a foundational principle
  from their foundations, and they are unable to give them up, no matter how much
  the scholars speak and clarify.


  Aḥmad and ash-Shāfiʿī and those like them fought against these nasheeds, and they
  used to call them at that time “at-Taghbīr”, meaning religious chants, meaning that
  they stir religious emotions.


  Ash-Shāfiʿī said:


  *“This was invented by the heretics in order to divert people away from the Book
  of Allah.”*


  And the one who becomes infatuated with nasheeds—his resolve and his desire for
  the Qurʾān becomes weak.


  We have already experienced this and come to know people from these categories.


  [Marḥaban yā ṭālib Al ''ilm p. 348]


  > Tr: Umm ʿAbdirraḥmān as-Sūdāniyyah'

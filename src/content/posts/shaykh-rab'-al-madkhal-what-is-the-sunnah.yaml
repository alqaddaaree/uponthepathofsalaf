title: 'Shaykh Rabī'' al-Madkhalī: What Is the Sunnah?'
date: '2026-01-19T19:49:56'
author: عَلَىٰ نَهجِ السَّلَفِ  Upon the path of the Salaf
quotedAuthor: Rabī' Al-Madkhali رحمه الله said:**
topics:

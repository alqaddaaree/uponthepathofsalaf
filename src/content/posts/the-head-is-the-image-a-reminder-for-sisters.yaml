body: '**The Head Is the Image**


  My sisters in Islam:


  Being lenient regarding images and picture-making is extremely dangerous. It is
  one of the major sins. It involves being cursed, and it prevents angels from entering,
  which in turn allows devils to take over.


  **What is the ruling on these images? And what must we avoid?**


  Images of living beings are prohibited when the head is present, based on the Prophet’s
  statement ﷺ:


  **«الصُّورَةُ الرَّأسُ، فَإِذَا قُطِعَ الرَّأسُ فلَا صُورَةَ»


  ***"The image is the head; if the head is cut off, there is no image."* [As-Sahihah,
  1921]


  And his statement ﷺ:


  **«فَمُرْ بِرَأْسِ التِّمْثَالِ الَّذِي فِي الْبَيْتِ يُقْطَعُ، فَيَصِيرُ كَهَيْئَةِ
  الشَّجَرَةِ»**


  *"Command that the head of the statue in the house be cut off, so it becomes like
  the shape of a tree."* [Narrated by Abu Dawud, 4158, from Abu Hurayrah, may Allah
  be pleased with him - graded ''Sahih'' by Sheikh Albani]


  The head is well-known. **Blurring the eyes or the face does not suffice as an alternative
  to cutting off the head**!


  **Whether the head is facing forward or backward, and whether the facial features
  are visible or not—it is still a head.** Once the head is removed, we are no longer
  in violation. The image is (essentially) the head!


  As for the remaining body parts of living beings, scholars have differed. The more
  cautious approach is to avoid them unless there is a need. However, this applies
  only if the body parts are NOT THOSE OF A WOMAN. It is not permissible to display
  a woman’s body parts, neither in reality nor in images, based on the Prophet’s statement
  ﷺ:


  **«المَرْأَةُ عَوْرَةٌ»**


  *"A woman is ‘awrah (to be covered)."* [Narrated by At-Tirmidhi, 1173, from Ibn
  Mas‘ud, may Allah be pleased with him)]


  A woman is commanded to cover herself and conceal her adornment. Her entire body
  is to be covered. So what about those who display women’s hands decorated with henna?
  This is a source of fitnah.


  And Allah is the One whose help is sought.


  ✍🏻 Umm Hafs Al-Hadhramiyyah Al-‘Adaniyyah, daughter of ‘Umar ibn Silm


  Source: https://t.me/alhadramiyaal3adaniya/7297'

body: '**When Does Deficiency Become Perfection?**


  بسم الله الرحمـٰن الرحيم


  All praise is due to Allāh, and prayers and peace be upon His Prophet and Chosen
  One.


  Al-Ḥāfiẓ Ibn Rajab — may Allāh have mercy on him — said:


  > Everything that people consider deficient in this worldly life—when it becomes
  connected to obedience to Allāh and His pleasure—is, in reality, true perfection.


  • The odor from the mouths of those who fast for His sake is more pleasant to Him
  than the fragrance of musk.


  • The bareness of those in iḥrām when visiting His House is more beautiful than
  fine garments.


  • The brokenness of the humble before His greatness is true restoration.


  • The humility of those who fear His might is true honour.


  • The striving of souls to be killed in His path is true life.


  • The hunger of those who fast for His sake is true fullness.


  • Their thirst in seeking His pleasure is true quenching.


  • The fatigue of the diligent in serving Him is true rest.


  The humiliation of a young man in love is a virtue, and his submission to his Beloved
  is an honour.


  Today a breeze from the breezes of nearness has blown upon the hearts. The broker
  of admonitions has come seeking reconciliation with those who were abandoned.


  Glad tidings have reached those who were cut off—that they will be reconnected,
  those who sinned—that they will be forgiven, and those deserving the Fire—that they
  will be freed.


  When the devils were chained in the month of Ramaḍān, and the fires of desires were
  extinguished through fasting. The authority of whims withdrew, and the rule became
  for the ruler of intellect with justice, so no excuse remained for the sinner.


  O clouds of heedlessness from the hearts—disperse!


  O suns of piety and faith—rise!


  O records of the deeds of those fasting—ascend!


  O hearts of those fasting—be humbled in khushūʿ!


  O feet of those who pray at night—prostrate to your Lord and bow!


  O eyes of the striving ones—do not sleep!


  O sins of the repentant—do not return!


  O earth of desires—swallow your water; and O sky of the souls—cease!


  O aspirations of the lovers—be not content with anything besides Allāh!


  In these days the tables of divine favour have been spread for those who fast—so
  none of you except that he has been invited:


  *«O our people! Respond (with obedience) to Allāh’s Caller..» [al-Aḥqāf: 31]*


  And O ambitions of the believers—hasten!


  Glad tidings to the one who responded, and thus attained.


  And woe to the one who was turned away from the door and had not been invited.


  *_*___


  “Bughyat al-Insān min Waẓāʾif Ramaḍān” p. 21-22, Summarized.


  Written by: Shaykha Sukaynah bint Muḥammad Nāṣiruddeen al-Albāniyyah.[



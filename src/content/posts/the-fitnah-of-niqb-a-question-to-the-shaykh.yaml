type: message
edited: '2026-06-20T12:52:58'
body: '**Questioner: Honorable Sheikh, the niqāb has trialed the men, the niqāb has
  trialed the men, the niqāb has trialed the men. Is there any advice for women about
  not tempting men? For many women have caused the deviation of many young men, and
  may Allāh reward you with good.


  Sheikh ibn ʿUthaymīn رحمه الله answered:**


  The niqāb is when a woman covers her face and leaves a small opening to see through,
  just enough for the eye alone, and without adorning the safir (the exposed part
  of the face around the eyes).


  Meaning she should not come with a beautifully decorated opening—no, it should be
  ordinary, and the opening should be narrow, just enough for her to see through,
  or just enough to see from it.


  This was permissible in the time of the Messenger ﷺ, women used to wear the niqāb,
  evidence being that the Prophet ﷺ forbade the woman in the state of iḥrām from wearing
  the niqāb. This indicates that it was customary for women to wear it.


  However, in the present time, unfortunately some women have taken advantage of this
  by making the niqāb exceed what is necessary.


  You find a woman wearing a niqāb with a wide opening for her eyes, revealing her
  eyebrows, cheeks, and perhaps even her forehead, thus they have gone beyond with
  this.


  For this reason, we refrained from issuing a fatwa permitting it — and we did not
  say it is forbidden; meaning we have not issued a fatwa prohibiting it — but we
  have refrained from issuing a fatwa permitting it to block the means and to prevent
  expansion [in its misuse].


  The truth is, the issue of women is that many women have been deceived by what is
  published in newspapers and magazines and what is heard in the media, so a woman
  thinks she is like the pictures [in the magazines], with no concern except adornment
  and temptation.


  This is undoubtedly one of the calamities of this world.


  ____


  > tr: umm tamīm as-ṣūmāliyyah'

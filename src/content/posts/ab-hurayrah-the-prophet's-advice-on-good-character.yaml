title: 'Abū Hurayrah: The Prophet''s ﷺ Advice on Good Character'
date: '2025-12-27T23:34:33'
author: عَلَىٰ نَهجِ السَّلَفِ  Upon the path of the Salaf
topics:
- repentance
- seerah
type: message
body: 'On the authority of Abū Hurayrah (رضي الله عنه),


  he said: The Messenger of Allāh ﷺ said:


  “Our Lord, Blessed and Exalted, descends every night to the lowest heaven when the
  last third of the night remains, and He says:


  ‘Who is calling upon Me, so that I may answer him?


  Who is asking Me, so that I may give him?


  Who is seeking My forgiveness, so that I may forgive him?’”


  — Ṣaḥīḥ al-Bukhārī (1145)'

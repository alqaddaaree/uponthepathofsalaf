title: 'Sheikh Muqbil al-Wadi''ī: A Warning Against Backbiting'
date: '2025-11-03T21:26:15'
author: عَلَىٰ نَهجِ السَّلَفِ  Upon the path of the Salaf
quotedAuthor: Muqbil al-Wadi‘ī – may Allah have mercy on him said:**
topics:
- Knowledge
- Scholars
type: message
edited: '2026-06-07T11:00:19'
body: '**Sheikh Muqbil al-Wadi‘ī – may Allah have mercy on him said:**


  “What I advise myself and everyone else is to occupy oneself with knowledge, for
  the concerns of this world have no end. Beware of being preoccupied with life’s
  problems; if we were, we would not be able to seek knowledge.”


  **Al-Bashā’ir fī al-Samā‘ al-Mubāshir (p.21)


  **


  > Tr: Umm ʿAbdirraḥmān as-Sūdāniyyah'

body: "It is recorded in the Ṣaḥīḥayn [al-Bukhārī 45, Muslim 3017] on the authority\
  \ of ʿUmar ibn al-Khaṭṭāb رضي الله عنه that a man from among the Jews said to him:\
  \ \"Yā ʾAmīr al-Muʾminīn , there is an āyah in your Book which, had it been revealed\
  \ to us —the assembly of Jews— we would have taken that day as a day of celebration\
  \ (ʿĪd).\" ʿUmar asked: \"Which āyah?\" The man replied:\n\n> ​{الْيَوْمَ أَكْمَلْتُ\
  \ لَكُمْ دِينَكُمْ وَأَتْمَمْتُ عَلَيْكُمْ نِعْمَتِي وَرَضِيتُ لَكُمُ الْأِسْلامَ\
  \ دِيناً} [المائدة: ٣]\n\n{This day I have perfected for you your religion and completed\
  \ My favour upon you and have approved for you Islām as religion} [Al-Māʾidah: 3]\n\
  \n\uFEFF\n\nʿUmar then said: \"I surely know the day on which it was revealed and\
  \ the place where it was revealed; it was revealed while the Messenger of Allāh\
  \ ﷺ was standing at ʿArafah on a Friday.\"\n\n**A beautiful benefit regarding this\
  \ āyah: **\n\nThe perfection of the religion that day was achieved through many\
  \ aspects, among them:\n\n• The Muslims had not performed the Ḥajj of Islām after\
  \ Ḥajj was made obligatory prior to that, not any one of them — this is the view\
  \ of the majority or many of the scholars. Thus, their religion was perfected by\
  \ completing the practice of all the pillars of Islām.\n\n• Allāh تعالى restored\
  \ the Ḥajj to the foundations laid by Ibrāhīm عليه السلام and eradicated shirk and\
  \ it's people; thus, not a single one of them mixed with the Muslims at that standing\
  \ site. Ash-Shaʿbī said: \"This āyah was revealed to the Prophet ﷺ while he was\
  \ standing at ʿArafah, when he stood where Ibrāhīm had stood, when shirk had vanished,\
  \ the landmarks of the pre-islāmic ignorance (Jāhiliyyah) were demolished, and no\
  \ one circumambulated the House (al-Kaʿba) naked.\" Qatādah and others said the\
  \ same. It was also said: \"No āyah permitting or prohibiting anything (Ḥalāl or\
  \ Ḥarām) was revealed after it.\" This was stated by Abū Bakr ibn ʿAyyāsh.\n\n>\
  \ Benefited from: Laṭāʾif al-Maʿārif by Ibn Rajab رحمه الله chapter regarding the\
  \ day of ʿArafah and ʿĪd an-Naḥr\n\nTr: Umm ʿAbdirraḥmān as-Sūdāniyyah"

type: message
edited: '2026-03-08T18:33:42'
body: '**Ibrāhīm at-Taymī رحمه الله said:


  **


  "I imagined myself in Paradise, eating from its fruits, embracing its maidens, and
  enjoying its bliss. Then I said to myself: O soul, what do you wish for?


  It replied: That I be returned to the world so I may increase in the deeds by which
  I attained this.


  Then I imagined myself in the Fire, being burned by its flames, drinking from its
  boiling water, and eating from its Zaqqūm. I said to myself: What do you wish for?


  It replied: That I be returned to the world so I may perform deeds by which I can
  be saved from this.


  So I said to myself: O soul, you are already in a state where this wish is possible
  — so work!"


  And it is reported that one of the Salaf used to dig a grave for himself. When he
  felt lazy in his deeds, he would descend into it, lie down in his niche, then say:


  "O my soul, imagine that you have died and are now in your grave. What would you
  wish for?


  It would say: That I be returned to the world so I may perform righteous deeds.


  So he would say: You have already been granted your wish — so stand up and do righteous
  deeds!"


  And know, may Allāh have mercy upon you, that the people of the graves wish that
  any one of them could Say a single tasbīḥ that would increase his good deeds, or
  be able to repent from some of his sins, or perform one rakʿah that would raise
  him in rank.


  **[Waṣiyyat Ibn Qudāmah al-Maqdisī رحمه الله p. 11]**


  > Tr: Umm ʿAbdirraḥmān as-Sūdāniyyah'

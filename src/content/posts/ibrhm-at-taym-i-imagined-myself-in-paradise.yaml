title: 'Ibrāhīm at-Taymī: I Imagined Myself in Paradise'
date: '2026-02-04T22:50:21'
author: عَلَىٰ نَهجِ السَّلَفِ  Upon the path of the Salaf
quotedAuthor: Qudāmah al-Maqdisī رحمه الله p. 11]**
topics:

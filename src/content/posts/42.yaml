body: '**To the Lonely, Saddened Hearts…**


  " I feel lonely, misunderstood and hurt. ever since I started practicing the people
  I was once close with have distanced themselves, my family says hurtful words and
  no one tries to understand how I think or feel"


  The Prophet ﷺ informed us of the reality of souls, how they get along and how they
  are repelled.


  He said:


  > الأرواحُ جُنودٌ مُجَنَّدَةٌ، فما تَعارَفَ منها ائْتَلَفَ، وما تَناكَرَ منها اخْتَلَفَ


  Souls are like gathered troops—those that recognize one another come together, and
  those that do not, differ.


  And he ﷺ also said words whose meaning reminds us how rare truth truly is:


  > ما أنتم في أهل الشرك إلا كالشعرة البيضاء في جلد الثور الأسود


  "you are not [among the people of shirk] except like the white strand of hair in
  the skin of a black bull"


  *We are not the majority.*


  Considering how few the people of the Sunnah are, and how scattered they are across
  the world, it is only natural that they will clash with most people around them.
  *Especially* when one takes the path of istiqāmah and knowledge at a young age.


  So ask yourself honestly: do you really expect to be understood?


  And even if people did understand you—what then? Would they react the way you hope?
  The way you expect? Not necessarily.


  People respond according to their own nature, their own desires, their own limitations.
  That is the nature of people. They are, by default, concerned with themselves. **They
  are not obligated to carry your emotional weight.**


  But do you really need them to?


  They hurt you. They misunderstood you. Your feelings were wounded. You felt emotionally
  shaken.


  Then what?


  Are you waiting for people to heal what they themselves caused? **Do you expect
  the cure to come from the same herb that poisoned you?**


  That will never happen.


  The Prophet ﷺ said:


  > بَدَأَ الْإِسْلَامُ غَرِيبًا وَسَيَعُودُ غَرِيبًا فَطُوبَى لِلْغُرَبَاءِ


  "Islam began as something strange and will return as something strange—so glad tidings
  to the strangers."


  The Prophet ﷺ called you a stranger and gave you glad tidings. So do you truly expect
  a stranger—rarer than diamonds—to be understood by the masses? Even diamonds are
  formed under pressure!


  I have long said, and it is well known in meaning:


  العلاقات مصالح


  **Relationships are built upon interests.**


  Every relationship carries a certain maṣlaḥah. That benefit may differ from person
  to person. A relationship at school often ends when school ends. A relationship
  at work ends when the shift ends. Even relationships built upon love carry a form
  of benefit (as love in itself is a benefit)—and when that benefit fades, the relationship
  often fades with it.


  So ask yourself: *what is your maṣlaḥah with those who hurt you?*


  Take what is lawful, and leave the rest. You do not need more from them. You do
  not need them to understand you. Even if they did, they would likely not respond
  the way you want them to.


  You were hurt—then what?


  **Life continues. People move on.**


  So we deal with people only as Allah commanded us to.


  Allah says:


  *وَأَحْسِنُوا إِنَّ اللَّهَ يُحِبُّ الْمُحْسِنِينَ


  “And do good; indeed, Allah loves the doers of good.”*


  And the Prophet ﷺ said:


  > إِنَّ اللَّهَ كَتَبَ الإِحْسَانَ عَلَى كُلِّ شَيْءٍ


  “Indeed, Allah has prescribed excellence (Iḥsān) in all things.”


  Iḥsān is of two types. The first—and the greatest—is iḥsān toward Allah in worship,
  which is obligatory.


  The second is iḥsān toward people, some of which is obligatory and some recommended.


  Shaykh Ibn ʿUthaymīn رحمه الله defined iḥsān toward people as:


  "بذل الندى، وكف الأذى، وطلاقة الوجه"


  To give what you are able to give, to withhold harm, and to meet people with a pleasant
  face.


  The Prophet ﷺ said:


  > المسلم من سلم المسلمون من لسانه ويده


  “The Believer is the one from whose tongue and hand others are safe.”


  And he ﷺ also said:


  > لا تحقرن من المعروف شيئًا ولو أن تلقى أخاك بوجه طلق


  “Do not belittle any good deed, even meeting your brother with a cheerful face.”


  So you fulfilled iḥsān. You refrained from harm. You showed good character. You
  earned reward.


  And that is your maṣlaḥah with people.'

body: '**Point from yesterday’s lesson: women not leaving the house unnecessarily,
  except for a genuine need


  **By: Shaykha Umm** **ʿAbdillāh Shahīdah Al-Briṭāniyyah


  ——•——


  The ḥadīth:


  **«إن المرأة عورة، فإذا خرجت استشرفها الشيطان»**


  *“The woman is ʿawrah, so when she leaves the house, Shayṭān seeks to draw attention
  to her [make a big deal out of her].”*


  **Meaning:** her presence becomes noticed, and attention may be drawn towards her.


  • This attention can affect a person over time, possibly changing her demeanour
  if she becomes used to being outside frequently.


  • Shayṭān may then follow this with *waswas* (whispers), influencing her thoughts
  and intentions.


  As you grow older, you realise that your place, your happiness is really at home.
  And if you have a good family, it is a home with your husband and children—whom
  you find to be your closest friends. They are the people who are always there for
  you and want to protect you no matter what.


  Our ustādha reflected on the āyah:


  *«وقرن في بيوتكن»*


  She explained that this part of the āyah clarifies the meaning of:


  *«ولا تبرجن تبرج الجاهلية الأولى»*


  In other words, remaining in the home is part of what defines avoiding *tabarruj*.


  In a society where women are encouraged to constantly be outside and active in public
  spaces, this concept may feel unfamiliar. However, this was also the case before
  Islam — among previous communities such as the Jews and Christians.


  - أم مصعب الغانية الألمانية'

id: '27'
title: 'Ibn al-Qayyim رحمه الله said:'
date: '2026-01-01T16:58:25'
author: عَلَىٰ نَهجِ السَّلَفِ  Upon the path of the Salaf
quotedAuthor: 'al-Qayyim رحمه الله said:'
topics:
- Sincerity
type: message
body: '**Ibn al-Qayyim رحمه الله said:


  **


  “Acting without sincerity and without following (the Sunnah) is like a traveler
  who fills his bag with sand – it only weighs him down and does not benefit him.”


  **Al-Fawā’id (p. 66)**'

title: 'Shaykh Ibn Bāz: With Calamities Comes a Calamity'
date: '2026-01-14T04:46:42'
author: عَلَىٰ نَهجِ السَّلَفِ  Upon the path of the Salaf
topics:
- scholars
type: message
body: 'Shaykh Ibn Baz رحمه الله said:


  **"With calamities comes a call to return to Allah and a warning for the people,
  so that they may return to Him."**


  (Majmū'' Fatāwa wa Maqālāt, 5/175)'

body: 'بسم الله الرحمـٰن الرحيم


  **من تزوج امرأة تلبس النقاب والقفاز ولا تتفرج على التلفاز وإلى أهل الحق تنحاز ولا
  تذهب إلى الحمام ولا تكثر الملام فقد حاز على امرأة الأحلام


  [الإمام الألمعي ص٢٤٨]


  **


  Whoever marries a woman who wears a niqab and gloves, doesn''t watch television,
  sides with the righteous, doesn''t go to the hammām (public saunas/pools), and doesn''t
  complain excessively, has found the woman of dreams.


  [Al-imām Al-Almaʿi p.248]


  A very widespread quote attributed to imām Al-wādiʿi رحمه الله.


  When I opened the book Al-imām Al-Almaʿi and went through it I did not find a single
  line of this quote mentioned, and in page 248 the only thing he said about women
  is:


  "النِّساء السّلفيات أغلى من الذهب الأحمر"


  "Salafi women are more precious than red gold"


  but that''s it.


  I tried to find another source for this quote or proof that he said it but none
  at all.


  I asked Shaykha Umm Salama wife of Shaykh Muqbil if he really said that and this
  was her response:


  "Shaykh al-Wādiʿī was not someone who used rhymed, ornate speech or embellished
  his words. So I do not think this is his speech at all. And since you searched in
  the book and did not find it, then it would be something falsely attributed to him."


  This really highlights the importance of mentioning and checking the sources of
  whatever we share or read.


  It is important that when we quote someone we make sure it is not falsely attributed
  to them, and when we do know who the quote belongs to then it is important we mention
  so and this is from الأمانة العِلمية (ʿilm integrity) and is how our deen is preserved.


  Imām Muḥammad bin sīrīn said:


  "إِنَّ هَذَا الْعِلْمَ دِينٌ. فَانْظُرُوا عَمَّنْ تَأْخُذُونَ دِينَكُمْ."


  "Indeed this knowledge is religion, so look to whom you take your religion from."


  [Saḥiḥ Muslim 1/14]


  And the Messenger of Allah ﷺ said:


  "كفى بِالْمَرْءِ كَذِبًا أَنْ يُحَدِّثَ بِكُلِّ مَا سَمِعَ".


  “It is enough of a lie for a person to repeat everything he hears.”


  [Saḥiḥ Muslim 1/10]


  So fear Allāh in what you share, especially during a time when tribulations are
  like pieces of a dark night, when truth and falsehood have mixed we must strive
  to seek the truth and differentiate it.


  كتبته أُمُّ عَبدِالرَّحمـٰن السُّودَانِيّة غفر الله لها


  ليلة ٢ شعبان ١٤٤٧هـ'

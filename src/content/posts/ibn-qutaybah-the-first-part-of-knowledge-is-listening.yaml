title: 'Ibn Qutaybah: The First Part of Knowledge Is Listening'
date: '2026-01-23T20:56:05'
author: عَلَىٰ نَهجِ السَّلَفِ  Upon the path of the Salaf
quotedAuthor: 'Qutaybah رحمه الله said: **'
topics:
- Knowledge
type: message
edited: '2026-01-24T13:28:05'
body: '**Ibn Qutaybah رحمه الله said: **


  “The first part of knowledge is silence; secondly, to listen; thirdly, to memorise;
  fourthly, to have understanding [and act upon it]; fifthly, to spread that knowledge.”


  > عيون الأخبار (٥٢١:١)'

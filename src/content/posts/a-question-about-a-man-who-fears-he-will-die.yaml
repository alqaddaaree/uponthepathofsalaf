body: '**The Question:**


  “Assalāmu ʿalaykum wa raḥmatullāhi wa barakātuh. O Shaykh, I ask Allāh that you
  are in the best of states. I have a question, may Allāh bless you.


  In the statement ‘Lā ʾilāha ʾillā Allāh’ (لا إله إلا الله), we know that the word
  ‘ʾilāh’ in the Arabic language means ‘maʿbūd’ (One who is worshipped). We also know
  that we derive from the Qurʾān that Tawḥīd is divided into three categories: Tawḥīd
  al-ʾUlūhiyyah, Tawḥīd ar-Rubūbiyyah, and Tawḥīd al-ʾAsmāʾ wa a**ṣ**-Ṣifāt.


  According to what I know, the statement ‘Lā ʾilāha ʾillā Allāh’ in itself encompasses
  all three categories of Tawḥīd. If this statement is correct, then where is Tawḥīd
  ar-Rubūbiyyah and Tawḥīd al-ʾAsmāʾ wa a**ṣ**-Ṣifāt within the statement ‘Lā ilāha
  illā Allāh’? Because this statement mentions ‘Lā ilāha illā Allāh’ meaning ‘There
  is no diety worthy of worship except Allāh’ — and it does not mention that Allāh,
  Glorified and Exalted, is One in His Rubūbiyyah and in His Names and Attributes.*


  May Allāh reward you, our noble Shaykh, and may Allāh bless you and make your final
  abode Paradise.”


  **The Answer:**


  Wa ʿalaykum as-salām wa raḥmatullāhi wa barakātuh.


  The people of knowledge say: **Tawḥīd ar-Rubūbiyyah is included in Tawḥīd al-ʾUlūhiyyah,
  and Tawḥīd al-ʾUlūhiyyah necessarily entails Tawḥīd al-Rubūbiyyah and (Tawḥīd) al-Asmāʾ
  wa aṣ-Ṣifāt.** How is that?


  When you affirm and acknowledge that there is no deity worthy of worship except
  Allāh, you are affirming and acknowledging **ʾUlūhiyyah** for Allāh, and you are
  affirming for Him **al-ʾAsmāʾ wa aṣ-Ṣifāt**.


  Is there an **ʾilāh** who is not a Rabb? Is there an **ʾilāh** who does not have
  the Most Beautiful Names and Attributes that indicate His perfection? This can never
  be.


  So if you acknowledge that Allāh is the true **ʾilāh**, then it is necessary that
  you acknowledge that He is the **Rabb**, the Owner, the Disposer, the One who governs
  the universe.


  And if He is the Rabb, the Owner, the Disposer, then it necessarily follows that
  He is **All-Hearing, All-Seeing, All-Knowing, All-Powerful**, and other attributes
  of Allāh.


  Thus, the word *Lā **ʾ**ilāha **ʾ**illā Allāh* indicates the **three categories
  of Tawḥīd**.


  - The word **ʾilāh** means **maʿbūd**. And the true one worthy of worship cannot
  be anything other than the Rabb, the Owner, the Disposer, the One who governs, who
  has the Most Beautiful Names and Lofty Attributes.


  - The word **maʿbūd** is an **attribute** of Allāh.


  - The word **Allāh **is one of the **Names** of Allāh from His Beautiful Names.


  The attributes of Allāh are divided into two types: **affirmed** and **negated**.
  Both types are present in the statement *Lā **ʾi**lāha **ʾ**illā Allāh*:


  - ***Lā ʾilāha*** — This is **negation** of any partner, equal, rival, or counterpart
  to Allāh. Negation of any son or wife, and negation of all attributes of deficiency
  and imperfection from Allāh.


  - ***ʾIllā Allāh*** — This is **affirmation** of perfection for Allāh. Thus true
  **ʾ**Ulūhiyyah and absolute perfection is affirmed for Allāh—Glorified and Exalted
  is He—which contains no deficiency or imperfection in any way whatsoever.


  > Answered by: The virtuous Shaykh Abū Zayd Muʿāfā ibn ʿAlī al-Maghlāfī.


  Translated by: Umm Tamīm aṣ-Ṣūmāliyyah'

body: '**The Noble Characteristics of Ibn al-Qayyim**


  Ibn Kathīr رحمه الله said in describing Ibn al-Qayyim رحمه الله:


  “He had good recitation and manners and had much love for others, and he did not
  envy, harm, or search for the faults of anyone, nor would he despise anyone. I was
  among those who accompanied him the most and the most beloved of people to him,
  and I do not know anyone among the people of knowledge in our time who did more
  worship than him. He had a method in the ṣalāh which he would lengthen greatly,
  and he would extend its rukūʿ and sujūd. Many of his companions would rebuke him
  [for this] at times, but he would not stop or leave off doing so, may Allāh have
  mercy on him.”


  Al-Bidāyah wa al-Nihāyah (vol. 18, pg. 523)


  Benefitted from the book ‘Ḥasad: Its Types, Harms, Signs, and Cure’ by Abū ʿAbd
  al-Raḥmān Nūr al-Dīn ibn Aḥmad al-Ḥubayshī


  Tr: Abū Hurayrah al-Birīṭānī



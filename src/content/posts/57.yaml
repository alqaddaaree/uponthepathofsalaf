body: '**The Glory of the Qurān and Its Prestige **


  Indeed the greatness of the Qurān, its prestige, and its glory has an impact on
  souls, and its affect on the heart and limbs is a sign of its miraculous nature,
  its particular manner, and the power of its meanings.


  It is no wonder for the Great Qurān, it is great in its meanings and manner, majestic
  in its topics and purposes, its benefits and effects widespread.


  Allāh Almighty says:


  > "If We had sent down this Qur’ān upon a mountain, you would have seen it humbled
  and splitting from fear of Allāh. And these examples We present to the people that
  perhaps they will give thought." [Sūrat Al-Ḥashr: 21]


  The Ḥāfidh Ibn Kathīr رحمه الله in his tafsīr says: "The Almighty says—greatifying
  the matter of the Qurān and clarifying its high status—that the hearts ought to
  tremble for it, and crack upon hearing it because of the true promise and certain
  warning it contains.


  "If* *We had sent down this Qur’ān upon a mountain, you would have seen it humbled
  and splitting from fear of Allāh. And these examples We present to the people"


  Meaning: If a mountain, in its thickness and hardness, were to understand this Qurʾān
  and contemplate what is in it and would humble itself and crack apart from the fear
  of Allāh, Glorified and Exalted. ​So how is it fitting for you, O humans, that your
  hearts do not soften, tremble, and crack from the fear of Allāh, when you have understood
  Allāh''s command and contemplated His Book?


  For this reason, the Almighty said: "And these examples We present to the people
  that perhaps they will give thought."


  If deaf mountains had they heard the words of Allāh and understood them, would have
  trembled and cracked from the fear of Him. So what about you, when you have heard
  and understood?


  📖 The State of the Salaf with the Qurʾān p.30 | حال السلف مع القرآن ص٣٠


  Tr : Umm Tamīm aṣ-Ṣūmāliyyah'

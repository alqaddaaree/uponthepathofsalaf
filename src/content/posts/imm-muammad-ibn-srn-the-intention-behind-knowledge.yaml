body: 'بسم الله الرحمـٰن الرحيم


  As Imām Muḥammad bin sīrīn رحمه الله said:


  > "إِنَّ هَذَا الْعِلْمَ دِينٌ. فَانْظُرُوا عَمَّنْ تَأْخُذُونَ دِينَكُمْ."


  "Indeed this knowledge is religion, so look to whom you take your religion from."


  [Saḥiḥ Muslim 1/14]


  In light of sincere advice, we clarify the manhaj of this channel.


  We follow the Qurʾān and Sunnah, according to the understanding of as-Salaf aṣ-Ṣāliḥ.


  **We condemn and detest:**


  • Taʿaṣṣub/ Tamadh-hub [Blind adherence to a particular madhhab or individual]


  • Taḥazzub [Partisanship]


  • Tamayyuʿ [watering down the religion]


  • Ghuluw [extremism] in tabdīʿ, takfīr or tafsīq.


  • Bidaʿ [innovations] whether in ʿaqīdah, worship or manhaj.


  • Shirk in all it''s forms.


  •Maʿāṣī, both public and private.


  This includes widespread evils such as free-mixing, tabarruj, music, taṣwīr, and
  publicizing or justifying sin.


  We uphold clarity with justice, firmness without oppression, and refutation without
  falsehood, lying, or backbiting in the name of calling to the truth. We follow the
  ḥaqq wherever it is — and ḥaqq is not restricted to particular individuals or groups.


  but as Allah ﷻ said:


  * ۖ فَإِن تَنَـٰزَعْتُمْ فِى شَىْءٍۢ فَرُدُّوهُ إِلَى ٱللَّهِ وَٱلرَّسُولِ إِن كُنتُمْ
  تُؤْمِنُونَ بِٱللَّهِ وَٱلْيَوْمِ ٱلْـَٔاخِرِ ۚ ذَٰلِكَ خَيْرٌۭ وَأَحْسَنُ تَأْوِيلًا


  "(And) if you differ in anything amongst yourselves, refer it to Allāh and His Messenger
  ﷺ, if you believe in Allāh and in the Last Day. That is better and more suitable
  for final determination." [An-Nisāʾ: 59]*


  (translation by Al-Hilāli & Khān رحمهم الله)


  > It is narrated from al-ʿIrbāḍ ibn Sāriyah رضي الله عنه that the Messenger of Allah
  ﷺ said:


  "فإنَّه مَن يَعِشْ منكم فسيَرَى اختِلافًا كثيرًا، فعليكم بسُنَّتي وسُنَّةِ الخُلَفاءِ
  الرَّاشِدينَ المَهْدِيِّينَ، عَضُّوا عليها بالنَّواجِذِ، وإيَّاكم ومُحدَثاتِ الأُمورِ؛
  فإنَّ كُلَّ بِدعةٍ ضَلالةٌ"


  “Indeed, whoever among you lives long will see much disagreement. So upon you is
  to adhere to my Sunnah and the Sunnah of the Rightly Guided Caliphs, Cling to it
  firmly with your molar teeth, and beware of newly invented matters, for indeed every
  innovation is misguidance.”


  Narrated by at-Tirmidhī (2676).


  We ask Allah ﷻ to guide us and you to that which He loves and show us the truth
  as truth and allow us to follow it, and show us falsehood as falsehood and allow
  us to avoid it.


  For advice or corrections please contact through forms:


  https://forms.gle/K2hiGVfjVvKRTDWH8


  وجزاكم الله خيرًا'

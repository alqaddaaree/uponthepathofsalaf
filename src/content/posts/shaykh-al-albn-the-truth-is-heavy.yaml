title: 'Shaykh al-Albānī: The Truth Is Heavy'
date: '2025-11-09T02:42:52'
author: عَلَىٰ نَهجِ السَّلَفِ  Upon the path of the Salaf
topics:
- character
- scholars
type: message
body: '**Shaykh al-Albani رحمه اللّٰه said:**


  "The truth is heavy. So, do not make it heavier with your bad manners. I used to
  believe that the (main) problem in the Ummah is ''aqidah, but it became clear to
  me that it is ''aqidah and manners."


  **Source: Silsila al-Huda wa al-Nur, Tape 900


  **


  > Tr: Umm ʿAbdirraḥmān as-Sūdāniyyah'

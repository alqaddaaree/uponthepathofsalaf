title: A Prayer for Reliance Upon Allah
date: '2026-03-23T13:06:51'
author: عَلَىٰ نَهجِ السَّلَفِ  Upon the path of the Salaf
topics: []
type: message
body: 'We ask Allāh to grant us and you reliance upon Him alone, with no partner.


  Translated by Umm Sahl al-ʾAfrīqiyyah


  Source: https://t.me/alwad3ya/16073'
